<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundmap Admin</title>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.10), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(168, 85, 247, 0.10), transparent 30%),
        linear-gradient(180deg, #07111f 0%, #0b1528 100%);
      color: white;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    .sidebar {
      padding: 16px;
      border-right: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top left, rgba(34,211,238,0.10), transparent 26%),
        radial-gradient(circle at bottom left, rgba(168,85,247,0.08), transparent 35%),
        linear-gradient(180deg, rgba(8,17,31,0.92), rgba(9,19,35,0.88));
      backdrop-filter: blur(18px);
      overflow-y: auto;
      max-height: 100vh;
    }

    .content {
      padding: 18px;
      overflow-y: auto;
      max-height: 100vh;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: #e0f2fe;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .hero, .panel, .card {
      margin-top: 14px;
      padding: 16px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        radial-gradient(circle at top right, rgba(56,189,248,0.10), transparent 30%);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    }

    .hero h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 10px 0 0;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.55;
    }

    .section-title {
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .input, .select, .textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      font-size: 14px;
      margin-top: 10px;
    }

    .textarea {
      min-height: 110px;
      resize: vertical;
      font-family: inherit;
    }

    .input:focus, .select:focus, .textarea:focus {
      border-color: rgba(56,189,248,0.35);
      box-shadow: 0 0 0 4px rgba(56,189,248,0.10);
    }

    .btn {
      width: 100%;
      border: 0;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      transition: .2s ease;
      margin-top: 10px;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      color: #03131c;
      box-shadow: 0 12px 30px rgba(14,165,233,0.22);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #e0f2fe;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat-box {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 800;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px 180px;
      gap: 10px;
      margin-top: 10px;
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
    }

    .card-sub {
      margin-top: 6px;
      color: #94a3b8;
      font-size: 13px;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      border: 1px solid rgba(255,255,255,0.10);
      white-space: nowrap;
    }

    .badge.pending {
      background: rgba(234,179,8,0.15);
      color: #fde68a;
      border-color: rgba(234,179,8,0.28);
    }

    .badge.approved {
      background: rgba(34,197,94,0.15);
      color: #bbf7d0;
      border-color: rgba(34,197,94,0.28);
    }

    .badge.rejected {
      background: rgba(239,68,68,0.15);
      color: #fecaca;
      border-color: rgba(239,68,68,0.28);
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
    }

    .desc {
      margin-top: 10px;
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .action-btn {
      border: 0;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      transition: .2s ease;
    }

    .action-btn:hover { transform: translateY(-1px); }

    .approve {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .reject {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .edit {
      background: rgba(255,255,255,0.08);
      color: #e0f2fe;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .status-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 13px;
      display: none;
      white-space: pre-wrap;
    }

    .status-box.show { display: block; }

    .status-box.success {
      background: rgba(20, 83, 45, 0.45);
      border: 1px solid rgba(74, 222, 128, 0.24);
      color: #dcfce7;
    }

    .status-box.error {
      background: rgba(127,29,29,.35);
      border: 1px solid rgba(248,113,113,.25);
      color: #fecaca;
    }

    .editor {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,0.72);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 99999;
    }

    .editor.show { display: flex; }

    .editor-card {
      width: min(760px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      border-radius: 24px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.10);
      background:
        linear-gradient(180deg, rgba(8,17,31,0.96), rgba(13,22,38,0.96)),
        radial-gradient(circle at top right, rgba(56,189,248,0.10), transparent 30%);
      box-shadow: 0 25px 80px rgba(0,0,0,0.35);
    }

    .editor-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .editor-title {
      font-size: 22px;
      font-weight: 800;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .edit-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .full {
      grid-column: 1 / -1;
    }

    @media (max-width: 980px) {
      .page { grid-template-columns: 1fr; }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        max-height: none;
      }
      .content { max-height: none; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .toolbar { grid-template-columns: 1fr; }
      .edit-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">🛠️ Soundmap Admin</div>

      <div class="hero">
        <div class="section-title">Yönetim Paneli</div>
        <h1>Önerileri yönet</h1>
        <p>Pending gelen kayıtları incele, düzenle, onayla veya reddet. Onaylananlar public haritada otomatik görünür.</p>
      </div>

      <div class="panel">
        <div class="section-title">Bağlantı</div>
        <button id="refreshBtn" class="btn btn-primary">Yenile</button>
        <button id="pendingBtn" class="btn btn-secondary">Sadece Pending</button>
        <div id="statusBox" class="status-box"></div>
      </div>
    </aside>

    <main class="content">
      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Toplam</div>
          <div id="statTotal" class="stat-value">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Pending</div>
          <div id="statPending" class="stat-value">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Approved</div>
          <div id="statApproved" class="stat-value">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Rejected</div>
          <div id="statRejected" class="stat-value">0</div>
        </div>
      </div>

      <div class="panel">
        <div class="section-title">Filtreler</div>
        <div class="toolbar">
          <input id="searchInput" class="input" type="text" placeholder="Başlık, şehir, ülke, vibe ara..." />
          <select id="statusFilter" class="select">
            <option value="all">Tüm durumlar</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
          <select id="sourceFilter" class="select">
            <option value="all">Tüm kaynaklar</option>
            <option value="youtube">YouTube</option>
            <option value="soundcloud">SoundCloud</option>
          </select>
        </div>
      </div>

      <div id="list" class="list"></div>
    </main>
  </div>

  <div id="editor" class="editor">
    <div class="editor-card">
      <div class="editor-head">
        <div class="editor-title">Kaydı düzenle</div>
        <button id="closeEditorBtn" class="close-btn" type="button">✕</button>
      </div>

      <form id="editForm">
        <input id="editId" type="hidden" />

        <div class="edit-grid">
          <input id="editTitle" class="input" type="text" placeholder="Başlık" required />
          <input id="editCategory" class="input" type="text" placeholder="Kategori" />

          <input id="editCity" class="input" type="text" placeholder="Şehir" required />
          <input id="editCountry" class="input" type="text" placeholder="Ülke" required />

          <input id="editLat" class="input" type="number" step="any" placeholder="Latitude" required />
          <input id="editLng" class="input" type="number" step="any" placeholder="Longitude" required />

          <input id="editEnvironment" class="input" type="text" placeholder="Atmosfer" />
          <input id="editVibe" class="input" type="text" placeholder="Vibe" />

          <select id="editSourceType" class="select">
            <option value="youtube">YouTube</option>
            <option value="soundcloud">SoundCloud</option>
          </select>

          <select id="editStatus" class="select">
            <option value="pending">pending</option>
            <option value="approved">approved</option>
            <option value="rejected">rejected</option>
          </select>

          <input id="editEmbedUrl" class="input full" type="url" placeholder="Embed URL" />
          <textarea id="editDescription" class="textarea full" placeholder="Açıklama"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Kaydet</button>
        <div id="editStatusBox" class="status-box"></div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://bfwugfrerjprlbbxgacj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_vQA_C-e7I5QjCNLwp6pT5Q_Pz_vhGBe";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const refreshBtn = document.getElementById("refreshBtn");
    const pendingBtn = document.getElementById("pendingBtn");
    const statusBox = document.getElementById("statusBox");

    const statTotal = document.getElementById("statTotal");
    const statPending = document.getElementById("statPending");
    const statApproved = document.getElementById("statApproved");
    const statRejected = document.getElementById("statRejected");

    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const sourceFilter = document.getElementById("sourceFilter");
    const listEl = document.getElementById("list");

    const editor = document.getElementById("editor");
    const closeEditorBtn = document.getElementById("closeEditorBtn");
    const editForm = document.getElementById("editForm");
    const editStatusBox = document.getElementById("editStatusBox");

    const editId = document.getElementById("editId");
    const editTitle = document.getElementById("editTitle");
    const editCategory = document.getElementById("editCategory");
    const editCity = document.getElementById("editCity");
    const editCountry = document.getElementById("editCountry");
    const editLat = document.getElementById("editLat");
    const editLng = document.getElementById("editLng");
    const editEnvironment = document.getElementById("editEnvironment");
    const editVibe = document.getElementById("editVibe");
    const editSourceType = document.getElementById("editSourceType");
    const editStatus = document.getElementById("editStatus");
    const editEmbedUrl = document.getElementById("editEmbedUrl");
    const editDescription = document.getElementById("editDescription");

    let allRows = [];

    function normalize(value) {
      return (value || "")
        .toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim()
        .replace(/ı/g, "i")
        .replace(/İ/g, "i")
        .replace(/ç/g, "c")
        .replace(/ğ/g, "g")
        .replace(/ö/g, "o")
        .replace(/ş/g, "s")
        .replace(/ü/g, "u");
    }

    function escapeHtml(value) {
      return (value || "").toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showStatus(message, type = "success") {
      statusBox.className = `status-box show ${type}`;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status-box";
      statusBox.textContent = "";
    }

    function showEditStatus(message, type = "success") {
      editStatusBox.className = `status-box show ${type}`;
      editStatusBox.textContent = message;
    }

    function clearEditStatus() {
      editStatusBox.className = "status-box";
      editStatusBox.textContent = "";
    }

    function badge(status) {
      const s = normalize(status) || "pending";
      return `<span class="badge ${s}">${s}</span>`;
    }

    function updateStats(rows) {
      statTotal.textContent = rows.length;
      statPending.textContent = rows.filter(r => normalize(r.status) === "pending").length;
      statApproved.textContent = rows.filter(r => normalize(r.status) === "approved").length;
      statRejected.textContent = rows.filter(r => normalize(r.status) === "rejected").length;
    }

    function filteredRows() {
      const q = normalize(searchInput.value);
      const statusVal = statusFilter.value;
      const sourceVal = sourceFilter.value;

      return allRows.filter(row => {
        const text = normalize([
          row.title,
          row.city,
          row.country,
          row.category,
          row.environment,
          row.vibe,
          row.description
        ].join(" "));

        const searchOk = !q || text.includes(q);
        const statusOk = statusVal === "all" ? true : normalize(row.status) === statusVal;
        const sourceOk = sourceVal === "all" ? true : normalize(row.source_type) === sourceVal;

        return searchOk && statusOk && sourceOk;
      });
    }

    function renderList() {
      const rows = filteredRows();

      if (!rows.length) {
        listEl.innerHTML = `<div class="card"><div class="desc">Kayıt bulunamadı.</div></div>`;
        return;
      }

      listEl.innerHTML = rows.map(row => `
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title">${escapeHtml(row.title || "İsimsiz kayıt")}</div>
              <div class="card-sub">
                ${escapeHtml(row.city || "")}${row.country ? ", " + escapeHtml(row.country) : ""}
                ${row.submitted_at ? " • " + new Date(row.submitted_at).toLocaleString("tr-TR") : ""}
              </div>
            </div>
            ${badge(row.status)}
          </div>

          <div class="pills">
            ${row.category ? `<div class="pill">${escapeHtml(row.category)}</div>` : ""}
            ${row.environment ? `<div class="pill">${escapeHtml(row.environment)}</div>` : ""}
            ${row.vibe ? `<div class="pill">${escapeHtml(row.vibe)}</div>` : ""}
            ${row.source_type ? `<div class="pill">${escapeHtml(row.source_type)}</div>` : ""}
            ${(row.lat != null && row.lng != null) ? `<div class="pill">📍 ${escapeHtml(String(row.lat))}, ${escapeHtml(String(row.lng))}</div>` : ""}
          </div>

          ${row.description ? `<div class="desc">${escapeHtml(row.description)}</div>` : ""}

          <div class="actions">
            <button class="action-btn approve" data-action="approve" data-id="${row.id}">Onayla</button>
            <button class="action-btn reject" data-action="reject" data-id="${row.id}">Reddet</button>
            <button class="action-btn edit" data-action="edit" data-id="${row.id}">Düzenle</button>
          </div>
        </div>
      `).join("");

      listEl.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          const action = btn.getAttribute("data-action");
          const row = allRows.find(r => String(r.id) === String(id));
          if (!row) return;

          if (action === "approve") {
            await updateStatus(id, "approved");
          } else if (action === "reject") {
            await updateStatus(id, "rejected");
          } else if (action === "edit") {
            openEditor(row);
          }
        });
      });
    }

    async function loadRows() {
      try {
        clearStatus();

        const { data, error } = await supabaseClient
          .from("soundmap_pins")
          .select("*")
          .order("submitted_at", { ascending: false });

        if (error) throw error;

        allRows = data || [];
        updateStats(allRows);
        renderList();
        showStatus("Kayıtlar yenilendi.", "success");
      } catch (err) {
        showStatus("Kayıtlar yüklenemedi.\n\n" + (err?.message || err), "error");
      }
    }

    async function updateStatus(id, newStatus) {
      try {
        const { error } = await supabaseClient
          .from("soundmap_pins")
          .update({ status: newStatus })
          .eq("id", id);

        if (error) throw error;

        await loadRows();
      } catch (err) {
        showStatus("Durum güncellenemedi.\n\n" + (err?.message || err), "error");
      }
    }

    function openEditor(row) {
      clearEditStatus();

      editId.value = row.id ?? "";
      editTitle.value = row.title ?? "";
      editCategory.value = row.category ?? "";
      editCity.value = row.city ?? "";
      editCountry.value = row.country ?? "";
      editLat.value = row.lat ?? "";
      editLng.value = row.lng ?? "";
      editEnvironment.value = row.environment ?? "";
      editVibe.value = row.vibe ?? "";
      editSourceType.value = row.source_type ?? "youtube";
      editStatus.value = row.status ?? "pending";
      editEmbedUrl.value = row.embed_url ?? "";
      editDescription.value = row.description ?? "";

      editor.classList.add("show");
    }

    function closeEditor() {
      editor.classList.remove("show");
      clearEditStatus();
    }

    async function saveEdit(e) {
      e.preventDefault();
      clearEditStatus();

      const id = editId.value;
      if (!id) return;

      const payload = {
        title: editTitle.value.trim(),
        category: editCategory.value.trim(),
        city: editCity.value.trim(),
        country: editCountry.value.trim(),
        lat: Number(editLat.value),
        lng: Number(editLng.value),
        environment: editEnvironment.value.trim(),
        vibe: editVibe.value.trim(),
        source_type: editSourceType.value.trim(),
        status: editStatus.value.trim(),
        embed_url: editEmbedUrl.value.trim(),
        description: editDescription.value.trim()
      };

      if (!payload.title || !payload.city || !payload.country || Number.isNaN(payload.lat) || Number.isNaN(payload.lng)) {
        showEditStatus("Başlık, şehir, ülke ve koordinatlar zorunlu.", "error");
        return;
      }

      try {
        const { error } = await supabaseClient
          .from("soundmap_pins")
          .update(payload)
          .eq("id", id);

        if (error) throw error;

        showEditStatus("Kayıt güncellendi.", "success");
        await loadRows();

        setTimeout(() => {
          closeEditor();
        }, 500);
      } catch (err) {
        showEditStatus("Kayıt güncellenemedi.\n\n" + (err?.message || err), "error");
      }
    }

    refreshBtn.addEventListener("click", loadRows);

    pendingBtn.addEventListener("click", () => {
      statusFilter.value = "pending";
      renderList();
    });

    searchInput.addEventListener("input", renderList);
    statusFilter.addEventListener("change", renderList);
    sourceFilter.addEventListener("change", renderList);

    closeEditorBtn.addEventListener("click", closeEditor);
    editForm.addEventListener("submit", saveEdit);

    editor.addEventListener("click", (e) => {
      if (e.target === editor) closeEditor();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && editor.classList.contains("show")) {
        closeEditor();
      }
    });

    window.addEventListener("load", loadRows);
  </script>
</body>
</html>
