<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundmap Space</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: Inter, Arial, sans-serif;
      background: #07111f;
      color: white;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    .sidebar {
      padding: 16px;
      border-right: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top left, rgba(34,211,238,0.10), transparent 26%),
        radial-gradient(circle at bottom left, rgba(168,85,247,0.08), transparent 35%),
        linear-gradient(180deg, rgba(8,17,31,0.95), rgba(9,19,35,0.92));
      overflow-y: auto;
      max-height: 100vh;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: #e0f2fe;
      font-size: 15px;
      font-weight: 700;
    }

    .hero, .panel {
      margin-top: 14px;
      padding: 16px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        radial-gradient(circle at top right, rgba(56,189,248,0.12), transparent 30%);
    }

    .hero-kicker {
      color: #7dd3fc;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .hero h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
    }

    .hero p, .status-line, .error-box {
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.55;
    }

    .search {
      width: 100%;
      margin-top: 14px;
      padding: 13px 15px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      font-size: 14px;
    }

    .search::placeholder {
      color: #94a3b8;
    }

    .btn {
      width: 100%;
      margin-top: 10px;
      padding: 13px 16px;
      border-radius: 16px;
      border: 0;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      color: #03131c;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #e0f2fe;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .discovery-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .discover-card {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .discover-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .discover-meta {
      color: #94a3b8;
      font-size: 12px;
    }

    #map {
      width: 100%;
      height: 100vh;
      min-height: 100vh;
      background: #0b1528;
    }

    .leaflet-control-layers {
      border-radius: 14px !important;
      background: rgba(2,6,23,0.88) !important;
      color: white !important;
      border: 1px solid rgba(255,255,255,.08) !important;
    }

    .leaflet-control-layers label {
      color: white !important;
    }

    .floating-player {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: min(420px, calc(100vw - 24px));
      z-index: 9999;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(8,17,31,0.95);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      overflow: hidden;
      transform: translateY(120%);
      opacity: 0;
      pointer-events: none;
      transition: .3s ease;
    }

    .floating-player.show {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .player-head {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .player-title {
      font-size: 18px;
      font-weight: 800;
    }

    .player-sub {
      margin-top: 4px;
      color: #94a3b8;
      font-size: 13px;
    }

    .player-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: white;
      cursor: pointer;
    }

    .player-body {
      padding: 14px 16px 16px;
    }

    .player-placeholder {
      padding: 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.10);
      color: #cbd5e1;
    }

    .player-embed iframe {
      width: 100%;
      min-height: 220px;
      border: 0;
      border-radius: 16px;
      background: #000;
    }

    .error-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(127,29,29,.35);
      border: 1px solid rgba(248,113,113,.25);
      white-space: pre-wrap;
      display: none;
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }

      #map {
        height: 62vh;
        min-height: 62vh;
      }

      .floating-player {
        left: 12px;
        right: 12px;
        width: auto;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">🌍 Soundmap Space</div>

      <div class="hero">
        <div class="hero-kicker">Ses Keşif Rehberi</div>
        <h1>Dünyayı sesle keşfet</h1>
        <p>Önce haritayı sağlam açıyoruz. Sonra veriyi üstüne koyuyoruz.</p>

        <input id="searchInput" class="search" type="text" placeholder="Şehir, ülke veya mekan ara..." />
        <button id="randomJourneyBtn" class="btn btn-primary">🎲 Bugün ne dinlemeliyim?</button>
      </div>

      <div class="panel">
        <div style="font-size:16px;font-weight:800;">Ses Durakları</div>
        <div id="discoveryList" class="discovery-list"></div>
      </div>

      <div id="resultCount" class="status-line"></div>
      <div id="errorBox" class="error-box"></div>
    </aside>

    <main>
      <div id="map"></div>
    </main>
  </div>

  <div id="floatingPlayer" class="floating-player">
    <div class="player-head">
      <div>
        <div id="playerTitle" class="player-title">Bir ses durağı seçin</div>
        <div id="playerSub" class="player-sub">Haritadaki pinlere tıklayın.</div>
      </div>
      <button id="playerCloseBtn" class="player-btn">✕</button>
    </div>

    <div class="player-body">
      <div id="playerEmbedArea" class="player-placeholder">
        Oynatıcı burada açılacak.
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://bfwugfrerjprlbbxgacj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_vQA_C-e7I5QjCNLwp6pT5Q_Pz_vhGBe";

    const DEMO_PINS = [
      {
        id: 1,
        title: "Yoros Kalesi",
        city: "İstanbul",
        country: "Türkiye",
        lat: 41.18,
        lng: 29.09,
        category: "Kültür",
        environment: "muze",
        vibe: "mistik",
        source_type: "youtube",
        embed_url: "https://www.youtube.com/watch?v=gwFg8AlN9zk",
        description: "Boğaza bakan tarihi atmosfer."
      },
      {
        id: 2,
        title: "Foça Sahili",
        city: "İzmir",
        country: "Türkiye",
        lat: 38.67,
        lng: 26.75,
        category: "Doğa",
        environment: "sahil",
        vibe: "sakin",
        source_type: "youtube",
        embed_url: "https://www.youtube.com/watch?v=jfKfPfyJRdk",
        description: "Deniz, rüzgar, açık gökyüzü."
      }
    ];

    const searchInput = document.getElementById("searchInput");
    const discoveryList = document.getElementById("discoveryList");
    const resultCount = document.getElementById("resultCount");
    const errorBox = document.getElementById("errorBox");
    const randomJourneyBtn = document.getElementById("randomJourneyBtn");

    const floatingPlayer = document.getElementById("floatingPlayer");
    const playerTitle = document.getElementById("playerTitle");
    const playerSub = document.getElementById("playerSub");
    const playerEmbedArea = document.getElementById("playerEmbedArea");
    const playerCloseBtn = document.getElementById("playerCloseBtn");

    let map;
    let supabaseClient = null;
    let allPins = [];
    let visiblePins = [];
    let markers = [];
    let mainBaseLayers = {};

    function normalize(value) {
      return (value || "")
        .toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim()
        .replace(/ı/g, "i")
        .replace(/İ/g, "i")
        .replace(/ç/g, "c")
        .replace(/ğ/g, "g")
        .replace(/ö/g, "o")
        .replace(/ş/g, "s")
        .replace(/ü/g, "u");
    }

    function cleanUrl(value) {
      const raw = (value || "").toString().trim();
      if (!raw) return "";
      if (raw.startsWith("//")) return "https:" + raw;
      if (raw.startsWith("www.")) return "https://" + raw;
      return raw;
    }

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    function hideError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function createMainBaseLayers() {
      const light = L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
        {
          attribution: "&copy; OpenStreetMap &copy; CARTO",
          maxZoom: 20
        }
      );

      const dark = L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
        {
          attribution: "&copy; OpenStreetMap &copy; CARTO",
          maxZoom: 20
        }
      );

      const classic = L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          attribution: "&copy; OpenStreetMap contributors",
          maxZoom: 20
        }
      );

      return {
        Light: light,
        Dark: dark,
        Classic: classic
      };
    }

    function initMap() {
      if (typeof L === "undefined") {
        showError("Leaflet yüklenemedi. Script hiç gelmemiş.");
        return;
      }

      map = L.map("map", {
        zoomControl: true,
        maxZoom: 20
      }).setView([39.0, 35.0], 6);

      mainBaseLayers = createMainBaseLayers();
      mainBaseLayers.Light.addTo(map);

      L.control.layers(mainBaseLayers, null, {
        collapsed: false,
        position: "topright"
      }).addTo(map);

      setTimeout(() => {
        map.invalidateSize();
      }, 300);
    }

    function makePinIcon() {
      return L.divIcon({
        className: "",
        html: `
          <div style="
            width:34px;
            height:34px;
            background:#38bdf8;
            border-radius:50% 50% 50% 0;
            transform:rotate(-45deg);
            border:3px solid white;
            box-shadow:0 8px 18px rgba(0,0,0,.22);
          "></div>
        `,
        iconSize: [34, 34],
        iconAnchor: [15, 32],
        popupAnchor: [0, -28]
      });
    }

    function youtubeEmbed(url) {
      const raw = cleanUrl(url);
      if (!raw) return "";
      if (raw.includes("youtube.com/embed/")) return raw;
      if (raw.includes("youtu.be/")) {
        const id = raw.split("youtu.be/")[1].split("?")[0];
        return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
      }
      if (raw.includes("watch?v=")) {
        const id = raw.split("watch?v=")[1].split("&")[0];
        return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
      }
      return "";
    }

    function openPlayer(pin) {
      playerTitle.textContent = pin.title || "İsimsiz durak";
      playerSub.textContent = `${pin.city || ""}${pin.country ? ", " + pin.country : ""}`;

      const embed = youtubeEmbed(pin.embed_url);

      if (embed) {
        playerEmbedArea.className = "player-embed";
        playerEmbedArea.innerHTML = `
          <iframe
            src="${embed}"
            allow="autoplay; encrypted-media; fullscreen"
            loading="lazy"
          ></iframe>
        `;
      } else {
        playerEmbedArea.className = "player-placeholder";
        playerEmbedArea.innerHTML = "Bu kayıt için oynatıcı linki çözümlenemedi.";
      }

      floatingPlayer.classList.add("show");
    }

    function closePlayer() {
      floatingPlayer.classList.remove("show");
    }

    function clearMarkers() {
      markers.forEach(marker => map.removeLayer(marker));
      markers = [];
    }

    function renderMarkers() {
      if (!map) return;

      clearMarkers();

      visiblePins.forEach(pin => {
        if (pin.lat == null || pin.lng == null) return;

        const marker = L.marker([Number(pin.lat), Number(pin.lng)], {
          icon: makePinIcon()
        }).addTo(map);

        marker.bindPopup(`
          <div style="min-width:200px;">
            <div style="font-weight:700;margin-bottom:6px;">${pin.title || "Kayıt"}</div>
            <div style="font-size:12px;color:#94a3b8;">
              ${pin.city || ""}${pin.country ? ", " + pin.country : ""}
            </div>
          </div>
        `);

        marker.on("click", () => {
          openPlayer(pin);
          map.flyTo([Number(pin.lat), Number(pin.lng)], 13, {
            animate: true,
            duration: 1.6
          });
        });

        markers.push(marker);
      });

      if (visiblePins.length) {
        const bounds = L.latLngBounds(
          visiblePins
            .filter(pin => pin.lat != null && pin.lng != null)
            .map(pin => [Number(pin.lat), Number(pin.lng)])
        );

        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [40, 40] });
        }
      }

      resultCount.textContent = `${visiblePins.length} lokasyon`;
    }

    function renderDiscovery() {
      if (!visiblePins.length) {
        discoveryList.innerHTML = `<div class="discover-card">Henüz görünür kayıt yok.</div>`;
        return;
      }

      discoveryList.innerHTML = visiblePins.slice(0, 6).map(pin => `
        <div class="discover-card" data-id="${pin.id}">
          <div class="discover-title">${pin.title || "İsimsiz durak"}</div>
          <div class="discover-meta">${pin.city || ""}${pin.country ? ", " + pin.country : ""}</div>
        </div>
      `).join("");

      discoveryList.querySelectorAll("[data-id]").forEach(card => {
        card.addEventListener("click", () => {
          const pin = visiblePins.find(p => String(p.id) === String(card.dataset.id));
          if (!pin) return;
          openPlayer(pin);
          map.flyTo([Number(pin.lat), Number(pin.lng)], 13, {
            animate: true,
            duration: 1.6
          });
        });
      });
    }

    function applySearch() {
      const q = normalize(searchInput.value);

      visiblePins = allPins.filter(pin => {
        const text = normalize([
          pin.title,
          pin.city,
          pin.country,
          pin.category,
          pin.environment,
          pin.description,
          pin.vibe
        ].join(" "));
        return !q || text.includes(q);
      });

      renderMarkers();
      renderDiscovery();
    }

    function randomJourney() {
      if (!visiblePins.length) return;
      const pin = visiblePins[Math.floor(Math.random() * visiblePins.length)];
      openPlayer(pin);
      map.flyTo([Number(pin.lat), Number(pin.lng)], 13, {
        animate: true,
        duration: 1.8
      });
    }

    async function loadPins() {
      allPins = DEMO_PINS.map(pin => ({
        ...pin,
        lat: Number(pin.lat),
        lng: Number(pin.lng)
      }));

      applySearch();

      try {
        if (!window.supabase) {
          showError("Supabase script yüklenemedi. Demo verilerle devam ediliyor.");
          return;
        }

        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await supabaseClient
          .from("soundmap_pins")
          .select("*")
          .eq("status", "approved")
          .order("title", { ascending: true });

        if (error) throw error;

        if (data && data.length) {
          allPins = data.map(pin => ({
            ...pin,
            lat: pin.lat != null ? Number(pin.lat) : null,
            lng: pin.lng != null ? Number(pin.lng) : null
          }));
          hideError();
          applySearch();
        }
      } catch (err) {
        showError("Supabase verisi alınamadı. Demo verilerle devam ediliyor.\n\n" + (err?.message || err));
      }
    }

    playerCloseBtn.addEventListener("click", closePlayer);
    searchInput.addEventListener("input", applySearch);
    randomJourneyBtn.addEventListener("click", randomJourney);

    window.addEventListener("load", async () => {
      try {
        initMap();
        await loadPins();
      } catch (err) {
        showError("Sayfa başlatılırken hata oldu:\n\n" + (err?.message || err));
      }
    });
  </script>
</body>
</html>
