<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundmap Space</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    .sidebar {
      padding: 24px;
      border-right: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top left, rgba(16,185,129,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,0.16), transparent 35%),
        #07111f;
      overflow-y: auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.28);
      color: #d1fae5;
      font-size: 14px;
      font-weight: 600;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 34px;
      line-height: 1.05;
    }

    .lead {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 15px;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      margin-bottom: 14px;
    }

    .search::placeholder {
      color: #94a3b8;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .cat-btn {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: #e2e8f0;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: .2s ease;
    }

    .cat-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.09);
    }

    .cat-btn.active {
      background: rgba(16,185,129,.14);
      border-color: rgba(16,185,129,.4);
      color: #d1fae5;
    }

    .card {
      margin-top: 14px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 240px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 13px;
      white-space: nowrap;
    }

    .location {
      color: #94a3b8;
      margin: 8px 0 14px;
      font-size: 14px;
    }

    .desc {
      color: #e2e8f0;
      line-height: 1.6;
      margin-bottom: 16px;
      min-height: 48px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
    }

    .media-wrap iframe,
    .media-wrap audio {
      width: 100%;
      border-radius: 14px;
      border: 0;
      margin-top: 10px;
      background: #000;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 16px;
      background: #10b981;
      color: #052e2b;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 14px;
      transition: .2s ease;
    }

    .buy-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    #map {
      height: 100vh;
      width: 100%;
      background: #07111f;
    }

    .loading,
    .empty {
      color: #cbd5e1;
      padding: 14px 0;
    }

    .error {
      color: #fecaca;
      background: rgba(127,29,29,.35);
      border: 1px solid rgba(248,113,113,.25);
      padding: 12px;
      border-radius: 14px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .leaflet-popup-content-wrapper {
      background: #020617;
      color: white;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .leaflet-popup-tip {
      background: #020617;
    }

    /* =========================
       PIN SYSTEM
    ========================= */

    .ey-pin {
      position: relative;
      transform: rotate(-45deg);
      overflow: hidden;
      isolation: isolate;
    }

    .ey-pin.is-active {
      filter: saturate(1.08);
    }

    .ey-pin-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.10);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.20);
    }

    .ey-pin-core {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* SEA / LAKE / RIVER / SHORE */
    .core-sea::before,
    .core-sea::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,.95);
      opacity: .9;
    }

    .core-sea::before {
      top: 30%;
      animation: waveMove 2.2s ease-in-out infinite;
    }

    .core-sea::after {
      top: 58%;
      animation: waveMove 2.2s ease-in-out infinite reverse;
    }

    /* FOREST / RURAL */
    .core-forest::before,
    .core-forest::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.92);
    }

    .core-forest::before {
      top: 28%;
      left: 26%;
      box-shadow:
        8px 4px 0 rgba(255,255,255,.88),
        2px 10px 0 rgba(255,255,255,.78);
      animation: forestPulse 2.8s ease-in-out infinite;
    }

    .core-forest::after {
      top: 38%;
      left: 48%;
      box-shadow:
        6px -5px 0 rgba(255,255,255,.72),
        -5px 8px 0 rgba(255,255,255,.62);
      animation: forestPulse 2.8s ease-in-out infinite reverse;
    }

    /* CITY / PORT / MARKET */
    .core-city::before,
    .core-city::after {
      content: "";
      position: absolute;
      bottom: 18%;
      width: 5px;
      border-radius: 2px 2px 0 0;
      background: rgba(255,255,255,.95);
    }

    .core-city::before {
      left: 28%;
      height: 11px;
      box-shadow:
        8px -2px 0 rgba(255,255,255,.85),
        16px 2px 0 rgba(255,255,255,.72);
      animation: cityBlink 2.1s ease-in-out infinite;
    }

    .core-city::after {
      left: 42%;
      height: 14px;
      opacity: .6;
    }

    /* MUSEUM / HISTORY / TEMPLE */
    .core-museum::before,
    .core-museum::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .core-museum::before {
      inset: 20%;
      border: 2px solid rgba(255,255,255,.92);
      animation: museumGlow 2.8s ease-in-out infinite;
    }

    .core-museum::after {
      inset: 34%;
      background: rgba(255,255,255,.95);
    }

    /* MOUNTAIN / CAVE / DESERT */
    .core-mountain::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 22%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 12px solid rgba(255,255,255,.92);
      animation: mountainGlow 3.4s ease-in-out infinite;
    }

    /* DEFAULT */
    .core-default::before {
      content: "";
      position: absolute;
      inset: 28%;
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      animation: softPulse 2.6s ease-in-out infinite;
    }

    .ey-pin.is-active .ey-pin-inner {
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.28),
        0 0 14px rgba(255,255,255,.10);
    }

    .ey-pin.is-active .ey-pin-core::before,
    .ey-pin.is-active .ey-pin-core::after {
      animation-duration: 1.6s !important;
    }

    @keyframes waveMove {
      0%, 100% { transform: translateX(-1px); opacity: .55; }
      50% { transform: translateX(2px); opacity: 1; }
    }

    @keyframes forestPulse {
      0%, 100% { transform: scale(.88); opacity: .42; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes cityBlink {
      0%, 100% { opacity: .42; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-1px); }
    }

    @keyframes museumGlow {
      0%, 100% { transform: scale(.88); opacity: .45; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    @keyframes mountainGlow {
      0%, 100% { opacity: .55; transform: translateX(-50%) scale(.96); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.04); }
    }

    @keyframes softPulse {
      0%, 100% { transform: scale(.86); opacity: .45; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }

      #map {
        height: 65vh;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .ey-pin-core::before,
      .ey-pin-core::after {
        animation: none !important;
      }
    }
  </style>
</head>

      const set = new Set(["Tümü"]);
      pins.forEach(pin => {
        if (pin.category) set.add(pin.category);
      });
      return [...set];
    }

    function getEnvironmentStyle(environment) {
      const key = normalize(environment);

      const map = {

      };

      return map[key] || { color: "#3b82f6", symbol: "🎧", label: "Kayıt" };
    }

    function getCoreClass(environment) {
      const key = normalize(environment);

      if (["deniz", "gol", "göl", "nehir", "sahil"].includes(key)) {
        return "core-sea";
      }

      if (["orman", "kirsal", "kırsal"].includes(key)) {
        return "core-forest";
      }

      if (["sehir", "şehir", "liman", "pazar"].includes(key)) {
        return "core-city";
      }

      if (["muze", "müze", "tarih", "tapinak", "tapınak"].includes(key)) {
        return "core-museum";
      }

      if (["dag", "dağ", "magara", "mağara", "col", "çöl"].includes(key)) {
        return "core-mountain";
      }

      return "core-default";
    }

    function makePinIcon(environment, isActive = false) {
      const env = getEnvironmentStyle(environment);
      const color = isActive ? "#ef4444" : env.color;

      const size = isActive ? 38 : 32;
      const innerSize = isActive ? 18 : 16;
      const border = isActive ? 4 : 3;
      const glow = isActive

        : `0 6px 14px rgba(0,0,0,.28)`;

      const coreClass = getCoreClass(environment);

      return L.divIcon({
        className: "",
        html: `
          <div
            class="ey-pin ${isActive ? 'is-active' : ''}"
            style="
              width:${size}px;
              height:${size}px;
              background:${color};
              border-radius:50% 50% 50% 0;
              border:${border}px solid #ffffff;

              style="

                height:${innerSize}px;
              "
            >
              <div class="ey-pin-core ${coreClass}"></div>
            </div>
          </div>
        `,
        iconSize: [size, size],
        iconAnchor: [size / 2 - 2, size - 2],
        popupAnchor: [0, -size + 8]
      });
    }

        btn.addEventListener("click", () => {
          activeCategory = cat;
          renderCategories();
          hasFittedBounds = false;
          applyFilters();
        });

        categoriesEl.appendChild(btn);
      });

      const q = normalize(searchInput.value);

      return allPins.filter(pin => {
        const categoryOk = activeCategory === "Tümü" ? true : pin.category === activeCategory;

        const text = [
          pin.title,
          pin.city,
          pin.country,
          pin.category,
          pin.environment,
          pin.description,
          pin.vibe
        ].map(normalize).join(" ");

        return categoryOk && (!q || text.includes(q));
      });
    }

          ${sourceType ? `<div class="pill">${sourceType}</div>` : ""}
        </div>

        <div class="media-wrap">
          ${mediaHtml}
        </div>

        ${shopifyUrl && shopifyUrl !== "#" ? `
          <a class="buy-btn" href="${shopifyUrl}" target="_blank" rel="noreferrer">
            Albümü satın al
          </a>
        ` : ""}
      `;
    }

    function renderMarkers() {
      clearMarkers();

      visiblePins.forEach(pin => {
        if (pin.lat == null || pin.lng == null) return;

        const isActive = pin.id === activePinId;

        const marker = L.marker([Number(pin.lat), Number(pin.lng)], {
          icon: makePinIcon(pin.environment || pin.category, isActive)
        }).addTo(map);

        marker.on("click", () => {
          activePinId = pin.id;
          renderCard(pin);
          renderMarkers();
          marker.openPopup();
        });

        const env = getEnvironmentStyle(pin.environment || "");

        marker.bindPopup(`
          <div style="min-width:180px;font-family:sans-serif;">
            <div style="font-weight:700;margin-bottom:6px;">
              ${pin.title || "Kayıt"}
            </div>

            <div style="font-size:12px;color:#94a3b8;margin-bottom:8px;">
              ${pin.city || ""}${pin.country ? ", " + pin.country : ""}
            </div>

            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${pin.category ? `
                <div style="
                  font-size:11px;
                  background:rgba(255,255,255,.06);
                  color:#e5e7eb;
                  padding:4px 7px;
                  border-radius:999px;
                  display:inline-block;
                  margin-bottom:8px;
                  border:1px solid rgba(255,255,255,.10);
                ">
                  ${pin.category}
                </div>
              ` : ""}

              ${pin.environment ? `
                <div style="
                  font-size:11px;
                  background:${env.color}22;
                  color:#e5e7eb;
                  padding:4px 7px;
                  border-radius:999px;
                  display:inline-block;
                  margin-bottom:8px;
                  border:1px solid ${env.color}55;
                ">
                  ${env.symbol} ${env.label}
                </div>
              ` : ""}
            </div>

            <div style="font-size:12px;color:#cbd5e1;">
              🎧 Dinlemek için pine tıkla
            </div>
          </div>
        `);

        markers.push(marker);
      });

      if (visiblePins.length === 0) {
        activePinId = null;
        renderCard(null);
        return;
      }

      const currentVisibleActive = visiblePins.find(p => p.id === activePinId);
      if (!currentVisibleActive) {
        activePinId = visiblePins[0].id;
      }

      const selected = visiblePins.find(p => p.id === activePinId) || visiblePins[0];
      renderCard(selected);

      const validCoords = visiblePins
        .filter(p => p.lat != null && p.lng != null)
        .map(p => [Number(p.lat), Number(p.lng)]);

      if (validCoords.length && !hasFittedBounds) {
        const bounds = L.latLngBounds(validCoords);
        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [40, 40] });
          hasFittedBounds = true;
        }
      }
    }

    function applyFilters() {
      visiblePins = filterPins();
      renderMarkers();
    }

    async function loadPins() {
      try {
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await supabase
          .from("soundmap_pins")
          .select("*")
          .order("title", { ascending: true });

        if (error || !data || !data.length) {
          allPins = DEMO;
        } else {
          allPins = data;
        }

        renderCategories();
        applyFilters();
      } catch (err) {
        allPins = DEMO;
        renderCategories();
        applyFilters();
        showError("Supabase fallback devrede. Demo veri gösteriliyor.\n\n" + (err?.message || err));
      }
    }

    function initMap() {
      try {
        map = L.map("map", { zoomControl: true }).setView([39.0, 35.0], 5);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap"
        }).addTo(map);

        setTimeout(() => {
          map.invalidateSize();
        }, 700);
      } catch (err) {
        showError("Harita başlatılamadı:\n" + (err?.message || err));
      }
    }

    searchInput.addEventListener("input", () => {
      hasFittedBounds = false;
      applyFilters();
    });

    window.addEventListener("load", () => {
      initMap();
      loadPins();
    });
  </script>
</body>
</html>
