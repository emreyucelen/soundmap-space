<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundmap Space</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    .sidebar {
      padding: 24px;
      border-right: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top left, rgba(16,185,129,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,0.16), transparent 35%),
        #07111f;
      overflow-y: auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.28);
      color: #d1fae5;
      font-size: 14px;
      font-weight: 600;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 34px;
      line-height: 1.05;
    }

    .lead {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 15px;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      margin-bottom: 14px;
    }

    .search::placeholder {
      color: #94a3b8;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .cat-btn {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: #e2e8f0;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: .2s ease;
    }

    .cat-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.09);
    }

    .cat-btn.active {
      background: rgba(16,185,129,.14);
      border-color: rgba(16,185,129,.4);
      color: #d1fae5;
    }

    .card {
      margin-top: 14px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 240px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 13px;
      white-space: nowrap;
    }

    .location {
      color: #94a3b8;
      margin: 8px 0 14px;
      font-size: 14px;
    }

    .desc {
      color: #e2e8f0;
      line-height: 1.6;
      margin-bottom: 16px;
      min-height: 48px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
    }

    .media-wrap iframe,
    .media-wrap audio {
      width: 100%;
      border-radius: 14px;
      border: 0;
      margin-top: 10px;
      background: #000;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 16px;
      background: #10b981;
      color: #052e2b;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 14px;
      transition: .2s ease;
    }

    .buy-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    #map {
      height: 100vh;
      width: 100%;
      background: #07111f;
    }

    .loading,
    .empty {
      color: #cbd5e1;
      padding: 14px 0;
    }

    .error {
      color: #fecaca;
      background: rgba(127,29,29,.35);
      border: 1px solid rgba(248,113,113,.25);
      padding: 12px;
      border-radius: 14px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .leaflet-popup-content-wrapper {
      background: #020617;
      color: white;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .leaflet-popup-tip {
      background: #020617;
    }

    /* PIN CORE */
    .ey-pin {
      position: relative;
      transform: rotate(-45deg);
      overflow: hidden;
      isolation: isolate;
      will-change: transform;
    }

    .ey-pin.is-active {
      filter: saturate(1.06);
    }

    .ey-pin-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
      z-index: 2;
    }

    .ey-pin-symbol {
      position: relative;
      z-index: 5;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.25));
      user-select: none;
    }

    .ey-pin-overlay,
    .ey-pin-overlay::before,
    .ey-pin-overlay::after {
      position: absolute;
      content: "";
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* DENIZ / GOL */
    .env-deniz .ey-pin-inner,
    .env-gol .ey-pin-inner {
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.20), transparent 45%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0));
    }

    .env-deniz .ey-pin-overlay,
    .env-gol .ey-pin-overlay {
      opacity: .95;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0) 0px,
          rgba(255,255,255,0) 3px,
          rgba(255,255,255,.16) 4px,
          rgba(255,255,255,0) 6px
        );
      background-size: 100% 12px;
      animation: seaFlow 3.4s linear infinite;
    }

    .env-deniz .ey-pin-overlay::after,
    .env-gol .ey-pin-overlay::after {
      inset: auto 10% 18% 10%;
      height: 36%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,.22), transparent 68%);
      animation: waterGlow 3.2s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    /* ORMAN */
    .env-orman .ey-pin-inner {
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.16), transparent 42%),
        radial-gradient(circle at 30% 70%, rgba(255,255,255,.08), transparent 32%);
    }

    .env-orman .ey-pin-overlay {
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,.14), transparent 28%),
        radial-gradient(circle at 65% 65%, rgba(255,255,255,.10), transparent 25%);
      animation: forestBreathe 3.6s ease-in-out infinite;
    }

    .env-orman .ey-pin-overlay::before {
      inset: 18% 18% 18% 18%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.13), transparent 20%),
        radial-gradient(circle at 70% 40%, rgba(255,255,255,.10), transparent 18%),
        radial-gradient(circle at 45% 70%, rgba(255,255,255,.08), transparent 20%);
      animation: forestBreathe 4.4s ease-in-out infinite reverse;
    }

    /* SEHIR */
    .env-sehir .ey-pin-inner {
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.02));
    }

    .env-sehir .ey-pin-overlay {
      inset: 18% 18% 18% 18%;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.06) 0%,
          rgba(255,255,255,.06) 18%,
          transparent 18%,
          transparent 30%,
          rgba(255,255,255,.08) 30%,
          rgba(255,255,255,.08) 48%,
          transparent 48%,
          transparent 62%,
          rgba(255,255,255,.10) 62%,
          rgba(255,255,255,.10) 80%,
          transparent 80%
        );
      border-radius: 4px;
      animation: cityPulse 2.8s ease-in-out infinite;
    }

    .env-sehir .ey-pin-overlay::after {
      inset: auto 14% 16% 14%;
      height: 28%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,.26), transparent 70%);
      animation: cityLights 2.1s ease-in-out infinite;
    }

    /* MUZE / TARIH */
    .env-muze .ey-pin-inner,
    .env-tarih .ey-pin-inner,
    .env-tapinak .ey-pin-inner {
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,.18), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0));
    }

    .env-muze .ey-pin-overlay,
    .env-tarih .ey-pin-overlay,
    .env-tapinak .ey-pin-overlay {
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.10);
      background: radial-gradient(circle, rgba(255,255,255,.14), transparent 68%);
      animation: museumGlow 3.8s ease-in-out infinite;
    }

    /* DAG */
    .env-dag .ey-pin-inner {
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.12), transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0));
    }

    .env-dag .ey-pin-overlay {
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), transparent 55%);
      animation: mountainAura 4.5s ease-in-out infinite;
    }

    /* DIGERLERI */
    .env-liman .ey-pin-inner,
    .env-pazar .ey-pin-inner,
    .env-sahil .ey-pin-inner,
    .env-kirsal .ey-pin-inner,
    .env-col .ey-pin-inner,
    .env-nehir .ey-pin-inner,
    .env-magara .ey-pin-inner {
      background:
        radial-gradient(circle at 50% 38%, rgba(255,255,255,.14), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0));
    }

    .env-liman .ey-pin-overlay,
    .env-pazar .ey-pin-overlay,
    .env-sahil .ey-pin-overlay,
    .env-kirsal .ey-pin-overlay,
    .env-col .ey-pin-overlay,
    .env-nehir .ey-pin-overlay,
    .env-magara .ey-pin-overlay {
      background: radial-gradient(circle, rgba(255,255,255,.11), transparent 70%);
      animation: softAlive 3.5s ease-in-out infinite;
    }

    /* ACTIVE PIN - biraz daha canlı */
    .ey-pin.is-active .ey-pin-overlay {
      animation-duration: 2.2s !important;
      opacity: 1;
    }

    .ey-pin.is-active .ey-pin-inner {
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.24),
        0 0 16px rgba(255,255,255,.10);
    }

    @keyframes seaFlow {
      0%   { transform: translateY(0); opacity: .55; }
      50%  { transform: translateY(4px); opacity: .95; }
      100% { transform: translateY(10px); opacity: .55; }
    }

    @keyframes waterGlow {
      0%, 100% { transform: scale(.88); opacity: .25; }
      50% { transform: scale(1.15); opacity: .46; }
    }

    @keyframes forestBreathe {
      0%, 100% { transform: scale(.92); opacity: .38; }
      50% { transform: scale(1.08); opacity: .78; }
    }

    @keyframes cityPulse {
      0%, 100% { opacity: .42; transform: scale(.96); }
      50% { opacity: .95; transform: scale(1.02); }
    }

    @keyframes cityLights {
      0%, 100% { opacity: .20; transform: scale(.8); }
      50% { opacity: .55; transform: scale(1.15); }
    }

    @keyframes museumGlow {
      0%, 100% { opacity: .32; transform: scale(.90); }
      50% { opacity: .70; transform: scale(1.08); }
    }

    @keyframes mountainAura {
      0%, 100% { opacity: .22; transform: scale(.96); }
      50% { opacity: .44; transform: scale(1.03); }
    }

    @keyframes softAlive {
      0%, 100% { opacity: .22; transform: scale(.95); }
      50% { opacity: .48; transform: scale(1.05); }
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }

      #map {
        height: 65vh;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .ey-pin-overlay,
      .ey-pin-overlay::before,
      .ey-pin-overlay::after {
        animation: none !important;
      }
    }
  </style>
</head>

      <div id="errorBox" class="error" style="display:none;"></div>

    <main>
      <div id="map"></div>

      },
      {

      },
      {

        title: "Lakeside Silence",
        city: "Bolu",

        description: "Göl kıyısında sakin ve dingin ambiyans.",
        lat: 40.61,

        category: "Doğa",
        environment: "gol",
        vibe: "Sessiz",
        duration: "3:01",
        source_type: "",
        embed_url: "",
        preview_audio_url: "",
        shopify_url: "#",
        price_label: ""
      }
    ];

    const cardArea = document.getElementById("cardArea");
    const categoriesEl = document.getElementById("categories");
    const searchInput = document.getElementById("searchInput");
    const errorBox = document.getElementById("errorBox");

    let map;
    let allPins = [];
    let visiblePins = [];
    let markers = [];
    let activeCategory = "Tümü";
    let activePinId = null;
    let hasFittedBounds = false;

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
      console.error(message);
    }

    function normalize(value) {
      return (value || "").toString().toLowerCase().trim();
    }

    function getCategories(pins) {
      const set = new Set(["Tümü"]);
      pins.forEach(pin => {
        if (pin.category) set.add(pin.category);
      });
      return [...set];
    }

    function getEnvironmentStyle(environment) {
      const key = normalize(environment);

      const map = {
        deniz:   { color: "#0ea5e9", symbol: "🌊", label: "Deniz", className: "env-deniz" },
        gol:     { color: "#38bdf8", symbol: "💧", label: "Göl", className: "env-gol" },
        "göl":   { color: "#38bdf8", symbol: "💧", label: "Göl", className: "env-gol" },
        orman:   { color: "#16a34a", symbol: "🌲", label: "Orman", className: "env-orman" },
        dag:     { color: "#78716c", symbol: "⛰️", label: "Dağ", className: "env-dag" },
        "dağ":   { color: "#78716c", symbol: "⛰️", label: "Dağ", className: "env-dag" },
        sehir:   { color: "#2563eb", symbol: "🏙️", label: "Şehir", className: "env-sehir" },
        "şehir": { color: "#2563eb", symbol: "🏙️", label: "Şehir", className: "env-sehir" },
        muze:    { color: "#7c3aed", symbol: "🏛️", label: "Müze", className: "env-muze" },
        "müze":  { color: "#7c3aed", symbol: "🏛️", label: "Müze", className: "env-muze" },
        tarih:   { color: "#ef4444", symbol: "🕰️", label: "Tarih", className: "env-tarih" },
        tapinak: { color: "#dc2626", symbol: "⛩️", label: "Tapınak", className: "env-tapinak" },
        "tapınak": { color: "#dc2626", symbol: "⛩️", label: "Tapınak", className: "env-tapinak" },
        col:     { color: "#f59e0b", symbol: "🏜️", label: "Çöl", className: "env-col" },
        "çöl":   { color: "#f59e0b", symbol: "🏜️", label: "Çöl", className: "env-col" },
        nehir:   { color: "#06b6d4", symbol: "💦", label: "Nehir", className: "env-nehir" },
        sahil:   { color: "#14b8a6", symbol: "🐚", label: "Sahil", className: "env-sahil" },
        liman:   { color: "#475569", symbol: "⚓", label: "Liman", className: "env-liman" },
        pazar:   { color: "#f97316", symbol: "🧺", label: "Pazar", className: "env-pazar" },
        magara:  { color: "#57534e", symbol: "🪨", label: "Mağara", className: "env-magara" },
        "mağara":{ color: "#57534e", symbol: "🪨", label: "Mağara", className: "env-magara" },
        kirsal:  { color: "#65a30d", symbol: "🌾", label: "Kırsal", className: "env-kirsal" },
        "kırsal":{ color: "#65a30d", symbol: "🌾", label: "Kırsal", className: "env-kirsal" }
      };

      return map[key] || { color: "#3b82f6", symbol: "🎧", label: "Kayıt", className: "env-default" };
    }

    function makePinIcon(environment, isActive = false) {
      const env = getEnvironmentStyle(environment);
      const color = isActive ? "#ef4444" : env.color;
      const size = isActive ? 36 : 30;
      const innerSize = isActive ? 18 : 15;
      const border = isActive ? 4 : 3;
      const glow = isActive
        ? `0 0 0 10px ${color}33, 0 10px 22px rgba(0,0,0,.35)`
        : `0 6px 14px rgba(0,0,0,.28)`;

      return L.divIcon({
        className: "",
        html: `
          <div
            class="ey-pin ${env.className} ${isActive ? 'is-active' : ''}"
            style="
              width:${size}px;
              height:${size}px;
              background:${color};
              border-radius:50% 50% 50% 0;
              border:${border}px solid #ffffff;
              box-shadow:${glow};
            "
          >
            <div
              class="ey-pin-inner"
              style="
                width:${innerSize}px;
                height:${innerSize}px;
              "
            >
              <div class="ey-pin-overlay"></div>
              <div class="ey-pin-symbol" style="font-size:${isActive ? '13px' : '11px'};">
                ${env.symbol}
              </div>
            </div>
          </div>
        `,
        iconSize: [size, size],
        iconAnchor: [size / 2 - 2, size - 2],
        popupAnchor: [0, -size + 8]
      });
    }

    function clearMarkers() {
      markers.forEach(marker => map.removeLayer(marker));
      markers = [];
    }

    function renderCategories() {
      const cats = getCategories(allPins);
      categoriesEl.innerHTML = "";

      cats.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-btn" + (cat === activeCategory ? " active" : "");
        btn.textContent = cat;

        btn.addEventListener("click", () => {
          activeCategory = cat;
          renderCategories();
          hasFittedBounds = false;
          applyFilters();
        });

        categoriesEl.appendChild(btn);
      });
    }

    function filterPins() {
      const q = normalize(searchInput.value);

      return allPins.filter(pin => {
        const categoryOk = activeCategory === "Tümü" ? true : pin.category === activeCategory;

        const text = [
          pin.title,
          pin.city,
          pin.country,
          pin.category,
          pin.environment,
          pin.description,
          pin.vibe
        ].map(normalize).join(" ");

        return categoryOk && (!q || text.includes(q));
      });
    }

    function renderCard(pin) {
      if (!pin) {
        cardArea.innerHTML = '<div class="empty">Kayıt bulunamadı.</div>';
        return;
      }

      const title = pin.title || "İsimsiz kayıt";
      const city = pin.city || "";
      const country = pin.country || "";
      const description = pin.description || "Açıklama yok";
      const price = pin.price_label || "";
      const category = pin.category || "";
      const vibe = pin.vibe || "";
      const duration = pin.duration || "";
      const sourceType = (pin.source_type || "").toLowerCase();
      const embedUrl = pin.embed_url || "";
      const audioUrl = pin.preview_audio_url || "";
      const shopifyUrl = pin.shopify_url || "#";
      const env = getEnvironmentStyle(pin.environment || "");

      let mediaHtml = "";
      if ((sourceType === "soundcloud" || sourceType === "youtube") && embedUrl) {
        mediaHtml = `<iframe src="${embedUrl}" height="166" allow="autoplay; encrypted-media"></iframe>`;
      } else if (audioUrl) {
        mediaHtml = `<audio controls src="${audioUrl}"></audio>`;
      }

      cardArea.innerHTML = `
        <div class="card-header">
          <div>
            <h2 style="margin:0;">${title}</h2>
            <div class="location">${city}${country ? ", " + country : ""}</div>
          </div>
          ${price ? `<div class="badge">${price}</div>` : ""}
        </div>

        <div class="desc">${description}</div>

        <div class="meta-row">
          ${category ? `<div class="pill">${category}</div>` : ""}
          ${pin.environment ? `<div class="pill">${env.symbol} ${env.label}</div>` : ""}
          ${vibe ? `<div class="pill">${vibe}</div>` : ""}
          ${duration ? `<div class="pill">${duration}</div>` : ""}
          ${sourceType ? `<div class="pill">${sourceType}</div>` : ""}
        </div>

        <div class="media-wrap">
          ${mediaHtml}
        </div>

        ${shopifyUrl && shopifyUrl !== "#" ? `
          <a class="buy-btn" href="${shopifyUrl}" target="_blank" rel="noreferrer">
            Albümü satın al
          </a>
        ` : ""}
      `;
    }

    function renderMarkers() {
      clearMarkers();

      visiblePins.forEach(pin => {
        if (pin.lat == null || pin.lng == null) return;

        const isActive = pin.id === activePinId;
        const marker = L.marker([Number(pin.lat), Number(pin.lng)], {
          icon: makePinIcon(pin.environment || pin.category, isActive)
        }).addTo(map);

        marker.on("click", () => {
          activePinId = pin.id;
          renderCard(pin);
          renderMarkers();
          marker.openPopup();
        });

        const env = getEnvironmentStyle(pin.environment || "");

        marker.bindPopup(`
          <div style="min-width:180px;font-family:sans-serif;">
            <div style="font-weight:700;margin-bottom:6px;">
              ${pin.title || "Kayıt"}
            </div>

            <div style="font-size:12px;color:#94a3b8;margin-bottom:8px;">
              ${pin.city || ""}${pin.country ? ", " + pin.country : ""}
            </div>

            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${pin.category ? `
                <div style="
                  font-size:11px;
                  background:rgba(255,255,255,.06);
                  color:#e5e7eb;
                  padding:4px 7px;
                  border-radius:999px;
                  display:inline-block;
                  margin-bottom:8px;
                  border:1px solid rgba(255,255,255,.10);
                ">
                  ${pin.category}
                </div>
              ` : ""}

              ${pin.environment ? `
                <div style="
                  font-size:11px;
                  background:${env.color}22;
                  color:#e5e7eb;
                  padding:4px 7px;
                  border-radius:999px;
                  display:inline-block;
                  margin-bottom:8px;
                  border:1px solid ${env.color}55;
                ">
                  ${env.symbol} ${env.label}
                </div>
              ` : ""}
            </div>

            <div style="font-size:12px;color:#cbd5e1;">
              🎧 Dinlemek için pine tıkla
            </div>
          </div>
        `);

        markers.push(marker);
      });

      if (visiblePins.length === 0) {
        activePinId = null;
        renderCard(null);
        return;
      }

      const currentVisibleActive = visiblePins.find(p => p.id === activePinId);
      if (!currentVisibleActive) {
        activePinId = visiblePins[0].id;
      }

      const selected = visiblePins.find(p => p.id === activePinId) || visiblePins[0];
      renderCard(selected);

      const validCoords = visiblePins
        .filter(p => p.lat != null && p.lng != null)
        .map(p => [Number(p.lat), Number(p.lng)]);

      if (validCoords.length && !hasFittedBounds) {
        const bounds = L.latLngBounds(validCoords);
        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [40, 40] });
          hasFittedBounds = true;
        }
      }
    }

    function applyFilters() {
      visiblePins = filterPins();
      renderMarkers();
    }

    async function loadPins() {
      try {
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await supabase
          .from("soundmap_pins")
          .select("*")
          .order("title", { ascending: true });

        if (error || !data || !data.length) {
          allPins = DEMO;
        } else {
          allPins = data;
        }

        renderCategories();
        applyFilters();
      } catch (err) {
        allPins = DEMO;
        renderCategories();
        applyFilters();
        showError("Supabase fallback devrede. Demo veri gösteriliyor.\n\n" + (err?.message || err));
      }
    }

    function initMap() {
      try {
        map = L.map("map", { zoomControl: true }).setView([39.0, 35.0], 5);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap"
        }).addTo(map);

        setTimeout(() => {
          map.invalidateSize();
        }, 700);
      } catch (err) {
        showError("Harita başlatılamadı:\n" + (err?.message || err));
      }
    }

    searchInput.addEventListener("input", () => {
      hasFittedBounds = false;
      applyFilters();
    });

    window.addEventListener("load", () => {
      initMap();
      loadPins();
    });
  </script>
</body>
</html>
