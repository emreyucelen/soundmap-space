<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundmap Space</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    .sidebar {
      padding: 24px;
      border-right: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top left, rgba(16,185,129,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,0.16), transparent 35%),
        #07111f;
      overflow-y: auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.28);
      color: #d1fae5;
      font-size: 14px;
      font-weight: 600;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 34px;
      line-height: 1.05;
    }

    .lead {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 15px;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      margin-bottom: 14px;
    }

    .search::placeholder {
      color: #94a3b8;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .cat-btn {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: #e2e8f0;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: .2s ease;
    }

    .cat-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.09);
    }

    .cat-btn.active {
      background: rgba(16,185,129,.14);
      border-color: rgba(16,185,129,.4);
      color: #d1fae5;
    }

    .card {
      margin-top: 14px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 240px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 13px;
      white-space: nowrap;
    }

    .location {
      color: #94a3b8;
      margin: 8px 0 14px;
      font-size: 14px;
    }

    .desc {
      color: #e2e8f0;
      line-height: 1.6;
      margin-bottom: 16px;
      min-height: 48px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
    }

    .media-wrap iframe,
    .media-wrap audio {
      width: 100%;
      border-radius: 14px;
      border: 0;
      margin-top: 10px;
      background: #000;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 16px;
      background: #10b981;
      color: #052e2b;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 14px;
      transition: .2s ease;
    }

    .buy-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    #map {
      height: 100vh;
      width: 100%;
      background: #07111f;
    }

    .loading,
    .empty {
      color: #cbd5e1;
      padding: 14px 0;
    }

    .error {
      color: #fecaca;
      background: rgba(127,29,29,.35);
      border: 1px solid rgba(248,113,113,.25);
      padding: 12px;
      border-radius: 14px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .leaflet-popup-content-wrapper {
      background: #020617;
      color: white;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .leaflet-popup-tip {
      background: #020617;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }

      #map {
        height: 65vh;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">🌍 Soundmap Space</div>

      <h1>Dünyayı sesle keşfet</h1>
      <p class="lead">
        Haritadaki pinlere tıkla, kayıtları dinle ve albümlere geç.
      </p>

      <input id="searchInput" class="search" type="text" placeholder="Şehir, ülke veya kayıt ara" />

      <div id="categories" class="categories"></div>

      <div id="cardArea" class="card">
        <div class="loading">Kayıtlar yükleniyor...</div>
      </div>

      <div id="errorBox" class="error" style="display:none;"></div>
    </aside>

    <main>
      <div id="map"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://bfwugfrerjprlbbxgacj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_vQA_C-e7I5QjCNLwp6pT5Q_Pz_vhGBe";

    const DEMO = [
      {
        id: 1,
        title: "Yoros Kalesi",
        city: "Istanbul",
        country: "Turkey",
        description: "Boğaz girişinde tarihi atmosfer ve açık alan ambiyansı.",
        lat: 41.18,
        lng: 29.09,
        category: "Kültür",
        vibe: "Tarihî",
        duration: "3:23",
        source_type: "soundcloud",
        embed_url: "https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A149632885&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true",
        preview_audio_url: "",
        shopify_url: "#",
        price_label: "149 TL"
      },
      {
        id: 2,
        title: "Akçakese Waves",
        city: "Istanbul",
        country: "Turkey",
        description: "Deniz, rüzgar ve kıyı atmosferi.",
        lat: 41.24,
        lng: 29.42,
        category: "Doğa",
        vibe: "Sakin",
        duration: "2:14",
        source_type: "",
        embed_url: "",
        preview_audio_url: "",
        shopify_url: "#",
        price_label: ""
      },
      {
        id: 3,
        title: "Bostancı Sahili",
        city: "Istanbul",
        country: "Turkey",
        description: "Kıyı yürüyüşü, şehir dokusu ve sahil sesleri.",
        lat: 40.953,
        lng: 29.096,
        category: "Şehir",
        vibe: "Canlı",
        duration: "1:58",
        source_type: "",
        embed_url: "",
        preview_audio_url: "",
        shopify_url: "#",
        price_label: ""
      }
    ];

    const cardArea = document.getElementById("cardArea");
    const categoriesEl = document.getElementById("categories");
    const searchInput = document.getElementById("searchInput");
    const errorBox = document.getElementById("errorBox");

    let map;
    let allPins = [];
    let visiblePins = [];
    let markers = [];
    let activeCategory = "Tümü";
    let activePinId = null;
    let hasFittedBounds = false;

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
      console.error(message);
    }

    function normalize(value) {
      return (value || "").toString().toLowerCase().trim();
    }

    function getCategories(pins) {
      const set = new Set(["Tümü"]);
      pins.forEach(pin => {
        if (pin.category) set.add(pin.category);
      });
      return [...set];
    }

    function getCategoryColor(category) {
      const key = normalize(category);

      const colorMap = {
        "kültür": "#8b5cf6",
        "doğa": "#10b981",
        "şehir": "#3b82f6",
        "gece": "#f59e0b",
        "ritüel": "#ec4899",
        "tarih": "#ef4444",
        "tarihî": "#ef4444",
        "ambient": "#06b6d4",
        "festival": "#f97316"
      };

      return colorMap[key] || "#3b82f6";
    }

    function makePinIcon(color, isActive = false) {
  const size = isActive ? 34 : 28;
  const inner = isActive ? 16 : 13;
  const border = isActive ? 4 : 3;
  const glow = isActive ? `0 0 0 10px ${color}33, 0 10px 22px rgba(0,0,0,.35)` : `0 6px 14px rgba(0,0,0,.28)`;

  return L.divIcon({
    className: "",
    html: `
      <div style="
        position: relative;
        width: ${size}px;
        height: ${size}px;
        transform: rotate(-45deg);
        background: ${color};
        border-radius: 50% 50% 50% 0;
        border: ${border}px solid #ffffff;
        box-shadow: ${glow};
      ">
        <div style="
          position: absolute;
          width: ${inner}px;
          height: ${inner}px;
          background: rgba(255,255,255,.95);
          border-radius: 50%;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%) rotate(45deg);
        "></div>
      </div>
    `,
    iconSize: [size, size],
    iconAnchor: [size / 2 - 2, size - 2],
    popupAnchor: [0, -size + 8]
  });
}

    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }

    function renderCategories() {
      const cats = getCategories(allPins);
      categoriesEl.innerHTML = "";

      cats.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-btn" + (cat === activeCategory ? " active" : "");
        btn.textContent = cat;

        btn.addEventListener("click", () => {
          activeCategory = cat;
          renderCategories();
          hasFittedBounds = false;
          applyFilters();
        });

        categoriesEl.appendChild(btn);
      });
    }

    function filterPins() {
      const q = normalize(searchInput.value);

      return allPins.filter(pin => {
        const categoryOk = activeCategory === "Tümü" ? true : pin.category === activeCategory;

        const text = [
          pin.title,
          pin.city,
          pin.country,
          pin.category,
          pin.description,
          pin.vibe
        ].map(normalize).join(" ");

        return categoryOk && (!q || text.includes(q));
      });
    }

    function renderCard(pin) {
      if (!pin) {
        cardArea.innerHTML = '<div class="empty">Kayıt bulunamadı.</div>';
        return;
      }

      const title = pin.title || "İsimsiz kayıt";
      const city = pin.city || "";
      const country = pin.country || "";
      const description = pin.description || "Açıklama yok";
      const price = pin.price_label || "";
      const category = pin.category || "";
      const vibe = pin.vibe || "";
      const duration = pin.duration || "";
      const sourceType = (pin.source_type || "").toLowerCase();
      const embedUrl = pin.embed_url || "";
      const audioUrl = pin.preview_audio_url || "";
      const shopifyUrl = pin.shopify_url || "#";

      let mediaHtml = "";
      if ((sourceType === "soundcloud" || sourceType === "youtube") && embedUrl) {
        mediaHtml = `<iframe src="${embedUrl}" height="166" allow="autoplay; encrypted-media"></iframe>`;
      } else if (audioUrl) {
        mediaHtml = `<audio controls src="${audioUrl}"></audio>`;
      }

      cardArea.innerHTML = `
        <div class="card-header">
          <div>
            <h2 style="margin:0;">${title}</h2>
            <div class="location">${city}${country ? ", " + country : ""}</div>
          </div>
          ${price ? `<div class="badge">${price}</div>` : ""}
        </div>

        <div class="desc">${description}</div>

        <div class="meta-row">
          ${category ? `<div class="pill">${category}</div>` : ""}
          ${vibe ? `<div class="pill">${vibe}</div>` : ""}
          ${duration ? `<div class="pill">${duration}</div>` : ""}
          ${sourceType ? `<div class="pill">${sourceType}</div>` : ""}
        </div>

        <div class="media-wrap">
          ${mediaHtml}
        </div>

        ${shopifyUrl && shopifyUrl !== "#" ? `
          <a class="buy-btn" href="${shopifyUrl}" target="_blank" rel="noreferrer">
            Albümü satın al
          </a>
        ` : ""}
      `;
    }

    function renderMarkers() {
      clearMarkers();

      visiblePins.forEach(pin => {
        if (pin.lat == null || pin.lng == null) return;

        const pinColor = getCategoryColor(pin.category);
        const isActive = pin.id === activePinId;

        const marker = L.marker([Number(pin.lat), Number(pin.lng)], {
          icon: makePinIcon(isActive ? "#ef4444" : pinColor, isActive)
        }).addTo(map);

        marker.on("click", () => {
          activePinId = pin.id;
          renderCard(pin);
          renderMarkers();
          marker.openPopup();
        });

        marker.bindPopup(`
          <div style="min-width:180px;font-family:sans-serif;">
            <div style="font-weight:700;margin-bottom:6px;">
              ${pin.title || "Kayıt"}
            </div>

            <div style="font-size:12px;color:#94a3b8;margin-bottom:8px;">
              ${pin.city || ""}${pin.country ? ", " + pin.country : ""}
            </div>

            ${pin.category ? `
              <div style="
                font-size:11px;
                background:${getCategoryColor(pin.category)}22;
                color:#e5e7eb;
                padding:4px 7px;
                border-radius:999px;
                display:inline-block;
                margin-bottom:8px;
                border:1px solid ${getCategoryColor(pin.category)}55;
              ">
                ${pin.category}
              </div>
            ` : ""}

            <div style="font-size:12px;color:#cbd5e1;">
              🎧 Dinlemek için pine tıkla
            </div>
          </div>
        `);

        markers.push(marker);
      });

      if (visiblePins.length === 0) {
        activePinId = null;
        renderCard(null);
        return;
      }

      const currentVisibleActive = visiblePins.find(p => p.id === activePinId);

      if (!currentVisibleActive) {
        activePinId = visiblePins[0].id;
      }

      const selected = visiblePins.find(p => p.id === activePinId) || visiblePins[0];
      renderCard(selected);

      const validCoords = visiblePins
        .filter(p => p.lat != null && p.lng != null)
        .map(p => [Number(p.lat), Number(p.lng)]);

      if (validCoords.length && !hasFittedBounds) {
        const bounds = L.latLngBounds(validCoords);
        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [40, 40] });
          hasFittedBounds = true;
        }
      }
    }

    function applyFilters() {
      visiblePins = filterPins();
      renderMarkers();
    }

    async function loadPins() {
      try {
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await supabase
          .from("soundmap_pins")
          .select("*")
          .order("title", { ascending: true });

        if (error || !data || !data.length) {
          allPins = DEMO;
        } else {
          allPins = data;
        }

        renderCategories();
        applyFilters();
      } catch (err) {
        allPins = DEMO;
        renderCategories();
        applyFilters();
        showError("Supabase fallback devrede. Demo veri gösteriliyor.\n\n" + (err?.message || err));
      }
    }

    function initMap() {
      try {
        map = L.map("map", { zoomControl: true }).setView([39.0, 35.0], 5);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap"
        }).addTo(map);

        setTimeout(() => {
          map.invalidateSize();
        }, 700);
      } catch (err) {
        showError("Harita başlatılamadı:\n" + (err?.message || err));
      }
    }

    searchInput.addEventListener("input", () => {
      hasFittedBounds = false;
      applyFilters();
    });

    window.addEventListener("load", () => {
      initMap();
      loadPins();
    });
  </script>
</body>
</html>
