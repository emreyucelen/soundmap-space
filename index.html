<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundmap Space | Sesin Coğrafyasını Keşfet</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.10), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(168, 85, 247, 0.10), transparent 30%),
        linear-gradient(180deg, #07111f 0%, #0b1528 100%);
      color: white;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    /* --- Sidebar --- */
    .sidebar {
      position: relative;
      padding: 16px;
      border-right: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top left, rgba(34,211,238,0.10), transparent 26%),
        radial-gradient(circle at bottom left, rgba(168,85,247,0.08), transparent 35%),
        linear-gradient(180deg, rgba(8,17,31,0.92), rgba(9,19,35,0.88));
      backdrop-filter: blur(18px);
      overflow-y: auto;
      max-height: 100vh;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: #e0f2fe;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .hero {
      margin-top: 14px;
      padding: 16px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        radial-gradient(circle at top right, rgba(56,189,248,0.16), transparent 30%);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    }

    .hero-kicker { color: #7dd3fc; font-size: 11px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
    .hero h1 { margin: 0; font-size: 24px; letter-spacing: -0.03em; }
    .hero p { margin: 10px 0 0; color: #cbd5e1; font-size: 13px; line-height: 1.55; }

    .search {
      width: 100%; padding: 13px 15px; margin-top: 14px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.05);
      color: white; outline: none; transition: .2s;
    }
    .search:focus { border-color: rgba(56,189,248,0.35); box-shadow: 0 0 0 4px rgba(56,189,248,0.10); }

    /* --- Buttons & Filters --- */
    .section-title { font-size: 11px; text-transform: uppercase; color: #94a3b8; margin: 14px 0 10px; font-weight: 700; }
    .moods, .categories, .environments { display: flex; flex-wrap: wrap; gap: 8px; }
    .mood-btn, .cat-btn, .env-btn, .mini-btn, .filters-toggle {
      border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.05);
      color: #e2e8f0; border-radius: 999px; padding: 9px 12px; cursor: pointer; font-size: 12px; transition: .2s;
    }
    .mood-btn.active, .cat-btn.active, .env-btn.active { background: rgba(34,211,238,0.14); border-color: rgba(34,211,238,0.35); }

    /* --- Discovery Panel --- */
    .discovery-panel {
      margin-top: 14px; padding: 14px; border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
    }
    .discovery-list {
      display: grid; gap: 10px; max-height: 320px; overflow-y: auto; padding-right: 6px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.18) transparent;
    }
    .discover-card {
      padding: 12px 14px; border-radius: 18px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: .2s;
    }
    .discover-card:hover { transform: translateY(-1px); background: rgba(255,255,255,0.08); }
    .more-btn {
      margin-top: 10px; width: 100%; padding: 11px; border-radius: 14px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
      color: #e2e8f0; font-size: 13px; font-weight: 700; cursor: pointer;
    }

    /* --- Travel Notice --- */
    .travel-notice {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%) translateY(-14px);
      z-index: 10000; padding: 12px 18px; border-radius: 999px; background: rgba(8,17,31,0.82);
      color: #e0f2fe; font-weight: 700; backdrop-filter: blur(14px); opacity: 0; transition: .35s;
    }
    .travel-notice.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* --- Floating Player --- */
    .floating-player {
      position: fixed; right: 22px; bottom: 22px; width: min(460px, calc(100vw - 24px));
      z-index: 9999; border-radius: 26px; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(8,17,31,0.92); backdrop-filter: blur(18px); transform: translateY(120%); opacity: 0; transition: .35s;
    }
    .floating-player.show { transform: translateY(0); opacity: 1; pointer-events: auto; }

    /* --- Pins & Map --- */
    #map { height: 100vh; width: 100%; background: #07111f; }
    .ey-pin { position: relative; transform: rotate(-45deg); border-radius: 50% 50% 50% 0; border: 3px solid #fff; }
    .ey-pin-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); border-radius: 50%; background: rgba(255,255,255,0.2); width: 16px; height: 16px; }

    /* Pin Animasyonları */
    @keyframes waveMove { 0%, 100% { transform: translateX(-1px); opacity: .55; } 50% { transform: translateX(2px); opacity: 1; } }
    .core-sea::before { content: ""; position: absolute; top: 30%; left: 10%; right: 10%; height: 2px; background: #fff; animation: waveMove 2s infinite; }
  </style>
</head>
<body>

  <div class="page">
    <aside class="sidebar">
      <div class="brand">🌍 Soundmap Space</div>
      
      <div class="hero">
        <div class="hero-kicker">Ses Keşif Rehberi</div>
        <h1>Dünyayı sesle keşfet</h1>
        <p>Hangi atmosferi özledin? Haritayı keşfet veya senin için seçtiklerimize göz at.</p>
        <input id="searchInput" class="search" type="text" placeholder="Şehir veya mekan ara..." />
      </div>

      <div class="section">
        <div class="section-title">Modlar</div>
        <div id="moods" class="moods"></div>
      </div>

      <div class="discovery-panel">
        <div class="discovery-head" style="display:flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
          <span style="font-weight: 800;">Günün Ses Durakları</span>
          <button id="refreshDiscoveryBtn" class="mini-btn">Yenile</button>
        </div>
        <div id="discoverySub" class="discovery-sub" style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;"></div>
        <div id="discoveryList" class="discovery-list"></div>
        <button id="toggleDiscoveryBtn" class="more-btn" style="display:none;">Daha fazlasını göster</button>
      </div>

      <div id="resultCount" class="status-line" style="margin-top:10px; font-size:12px; color:#94a3b8;"></div>
    </aside>

    <main><div id="map"></div></main>
  </div>

  <div id="floatingPlayer" class="floating-player">
    <div style="padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;">
      <div>
        <div id="playerTitle" style="font-weight: 800; font-size: 16px;">Mekan İsmi</div>
        <div id="playerSub" style="font-size: 12px; color: #94a3b8;">Konum bilgisi</div>
      </div>
      <button onclick="document.getElementById('floatingPlayer').classList.remove('show')" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
    </div>
    <div style="padding: 16px;">
      <div id="playerEmbedArea"></div>
    </div>
  </div>

  <div id="travelNotice" class="travel-notice">Yeni durağa gidiliyor…</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://bfwugfrerjprlbbxgacj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_vQA_C-e7I5QjCNLwp6pT5Q_Pz_vhGBe";

    const travelNoticeEl = document.getElementById("travelNotice");
    const discoveryListEl = document.getElementById("discoveryList");
    const toggleDiscoveryBtn = document.getElementById("toggleDiscoveryBtn");
    const refreshDiscoveryBtn = document.getElementById("refreshDiscoveryBtn");

    let map, allPins = [], markers = [], discoveryExpanded = false, activeMood = "tum";

    const MOODS = [
      { key: "tum", label: "✨ Hepsi", matcher: () => true },
      { key: "sakin", label: "🌊 Sakin", matcher: p => (p.vibe||"").toLowerCase().includes("sakin") },
      { key: "sehir", label: "🏙️ Enerjik", matcher: p => (p.category||"").toLowerCase().includes("şehir") }
    ];

    function normalize(v) { return (v || "").toString().toLowerCase().trim(); }
    function shuffleArray(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function showTravelNotice(text = "Yeni durağa gidiliyor…") {
      travelNoticeEl.textContent = text;
      travelNoticeEl.classList.add("show");
    }

    function hideTravelNotice() {
      travelNoticeEl.classList.remove("show");
    }

    function cinematicFlyTo(lat, lng) {
      showTravelNotice("Yeni durağa gidiliyor…");
      map.flyTo(map.getCenter(), 5.7, { animate: true, duration: 1.8 });
      setTimeout(() => {
        map.flyTo([Number(lat), Number(lng)], 14, { animate: true, duration: 2.8 });
      }, 1400);
      setTimeout(hideTravelNotice, 3900);
    }

    function openFloatingPlayer(pin) {
      document.getElementById("playerTitle").textContent = pin.title;
      document.getElementById("playerSub").textContent = `${pin.city}, ${pin.country}`;
      let videoId = pin.embed_url.includes("v=") ? pin.embed_url.split("v=")[1].split("&")[0] : pin.embed_url.split("/").pop();
      document.getElementById("playerEmbedArea").innerHTML = `<iframe width="100%" height="220" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:14px;"></iframe>`;
      document.getElementById("floatingPlayer").classList.add("show");
    }

    function renderMarkers() {
      markers.forEach(m => map.removeLayer(m)); markers = [];
      const moodMatcher = MOODS.find(m => m.key === activeMood)?.matcher || (() => true);
      const filtered = allPins.filter(moodMatcher);

      filtered.forEach(pin => {
        const marker = L.marker([pin.lat, pin.lng], {
          icon: L.divIcon({
            className: "",
            html: `<div class="ey-pin" style="width:34px; height:34px; background:#38bdf8;">
                     <div class="ey-pin-inner core-sea"></div>
                   </div>`,
            iconAnchor: [17, 34]
          })
        }).addTo(map);
        marker.on("click", () => {
          openFloatingPlayer(pin);
          map.flyTo([pin.lat, pin.lng], 14, { duration: 2.0 });
        });
        markers.push(marker);
      });
      document.getElementById("resultCount").textContent = `${filtered.length} lokasyon gösteriliyor`;
    }

    function renderDiscovery() {
      const moodMatcher = MOODS.find(m => m.key === activeMood)?.matcher || (() => true);
      const base = allPins.filter(pin => moodMatcher(pin));
      const pickedAll = shuffleArray(base).filter(pin => pin.lat != null && pin.lng != null).slice(0, 6);

      document.getElementById("discoverySub").textContent = activeMood === "tum" ? "Senin için seçtiğimiz duraklar." : "Moduna uygun seçkiler.";

      if (!pickedAll.length) {
        discoveryListEl.innerHTML = `<div style="padding:10px; font-size:12px;">Sonuç bulunamadı.</div>`;
        toggleDiscoveryBtn.style.display = "none";
        return;
      }

      const visibleItems = discoveryExpanded ? pickedAll : pickedAll.slice(0, 2);

      discoveryListEl.innerHTML = visibleItems.map(pin => `
        <div class="discover-card" data-id="${pin.id}">
          <div style="font-size:13px; font-weight:700;">${pin.title}</div>
          <div style="font-size:11px; color:#94a3b8;">${pin.city}, ${pin.country}</div>
        </div>
      `).join("");

      if (pickedAll.length > 2) {
        toggleDiscoveryBtn.style.display = "block";
        toggleDiscoveryBtn.textContent = discoveryExpanded ? "Daha az göster" : "Daha fazlasını göster";
      } else {
        toggleDiscoveryBtn.style.display = "none";
      }

      discoveryListEl.querySelectorAll(".discover-card").forEach(el => {
        el.addEventListener("click", () => {
          const pin = allPins.find(p => String(p.id) === el.dataset.id);
          if (pin) {
            openFloatingPlayer(pin);
            cinematicFlyTo(pin.lat, pin.lng);
          }
        });
      });
    }

    async function init() {
      map = L.map("map").setView([39.0, 35.0], 6);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const { data } = await supabase.from("soundmap_pins").select("*");
      allPins = data || [];

      // Mood Butonları
      const moodsDiv = document.getElementById("moods");
      MOODS.forEach(m => {
        const btn = document.createElement("button");
        btn.className = "mood-btn" + (m.key === activeMood ? " active" : "");
        btn.textContent = m.label;
        btn.onclick = () => {
          activeMood = m.key;
          document.querySelectorAll(".mood-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          renderMarkers(); renderDiscovery();
        };
        moodsDiv.appendChild(btn);
      });

      renderMarkers(); renderDiscovery();
    }

    toggleDiscoveryBtn.onclick = () => { discoveryExpanded = !discoveryExpanded; renderDiscovery(); };
    refreshDiscoveryBtn.onclick = () => { discoveryExpanded = false; renderDiscovery(); };
    document.getElementById("searchInput").oninput = (e) => {
      const q = normalize(e.target.value);
      markers.forEach((m, i) => {
        const pin = allPins[i];
        if (normalize(pin.title).includes(q) || normalize(pin.city).includes(q)) {
          m.getElement().style.display = "block";
        } else {
          m.getElement().style.display = "none";
        }
      });
    };

    window.onload = init;
  </script>
</body>
</html>
