<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundmap Space</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* ============ GENEL ============ */
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#07111f;
  color:white;
}

.page {
  display:grid;
  grid-template-columns:360px 1fr;
  height:100vh;
}

/* ============ SIDEBAR ============ */
.sidebar {
  padding:16px;
  background:#0b1528;
}

.brand {
  font-weight:700;
  margin-bottom:12px;
}

.search {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #333;
  background:#111;
  color:white;
}

/* ============ BUTON ============ */
.btn {
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-weight:700;
  margin-top:10px;
}

/* 🔥 ANA BUTON */
.btn-primary {
  background:linear-gradient(135deg,#22d3ee,#3b82f6);
  color:black;
  animation:breathe 3s ease-in-out infinite;
}

/* 🫧 SOFT BUTON */
.btn-secondary {
  background:#1e293b;
  color:white;
  animation:breatheSoft 4s ease-in-out infinite;
}

/* 💫 ANİMASYON */
@keyframes breathe {
  0%,100% {transform:scale(1);box-shadow:0 0 0 rgba(0,0,0,0);}
  50% {transform:scale(1.03);box-shadow:0 10px 30px rgba(59,130,246,0.4);}
}

@keyframes breatheSoft {
  0%,100% {transform:scale(1);}
  50% {transform:scale(1.015);}
}

/* ============ MAP ============ */
#map { height:100vh; }

/* ============ PLAYER ============ */
.player {
  position:fixed;
  right:20px;
  bottom:20px;
  width:400px;
  background:#020617;
  border-radius:20px;
  padding:14px;
  display:none;
}

.player.show { display:block; }

.player img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:14px;
}

.links a {
  display:inline-block;
  margin:4px;
  padding:6px 10px;
  border-radius:10px;
  background:#111;
  color:white;
  text-decoration:none;
  font-size:12px;
}

</style>
</head>

<body>

<div class="page">

<div class="sidebar">
  <div class="brand">🌍 Soundmap</div>

  <input id="search" class="search" placeholder="Ara...">

  <button id="randomBtn" class="btn btn-primary">
    🎲 Bugün ne dinlemeliyim?
  </button>

  <button id="refreshBtn" class="btn btn-secondary">
    Yenile
  </button>
</div>

<div id="map"></div>

</div>

<div id="player" class="player">
  <img id="playerImg">
  <h3 id="playerTitle"></h3>
  <p id="playerLocation"></p>

  <div class="links" id="links"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* DEMO DATA */
const pins = [
  {
    title:"Foça Sahil",
    city:"İzmir",
    lat:38.67,
    lng:26.75,
    photo:"",
    youtube:"https://www.youtube.com/watch?v=jfKfPfyJRdk"
  }
];

/* MAP */
const map = L.map("map").setView([39,35],6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

/* FALLBACK FOTO */
function getPhoto(pin){
  return pin.photo || "https://images.unsplash.com/photo-1507525428034-b723cf961d3e";
}

/* MARKERS */
pins.forEach(p=>{
  const m = L.marker([p.lat,p.lng]).addTo(map);

  m.on("click",()=>{
    openPlayer(p);
  });
});

/* PLAYER */
function openPlayer(p){
  document.getElementById("player").classList.add("show");

  document.getElementById("playerImg").src = getPhoto(p);
  document.getElementById("playerTitle").innerText = p.title;
  document.getElementById("playerLocation").innerText = p.city;

  let html="";

  if(p.youtube){
    html += `<a href="${p.youtube}" target="_blank">YouTube</a>`;
  }

  document.getElementById("links").innerHTML = html;
}

/* RANDOM */
document.getElementById("randomBtn").onclick=()=>{
  const p = pins[Math.floor(Math.random()*pins.length)];
  openPlayer(p);
  map.flyTo([p.lat,p.lng],13);
};

</script>

</body>
</html>
