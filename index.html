<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundmap Space</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    .sidebar {
      padding: 24px;
      border-right: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top left, rgba(16,185,129,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,0.16), transparent 35%),
        #07111f;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.28);
      color: #d1fae5;
      font-size: 14px;
      font-weight: 600;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 34px;
      line-height: 1.05;
    }

    .lead {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 15px;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      margin-bottom: 14px;
    }

    .search::placeholder { color: #94a3b8; }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .cat-btn {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: #e2e8f0;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    .cat-btn.active {
      background: rgba(16,185,129,.14);
      border-color: rgba(16,185,129,.4);
      color: #d1fae5;
    }

    .card {
      margin-top: 14px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 13px;
      white-space: nowrap;
    }

    .location {
      color: #94a3b8;
      margin: 8px 0 14px;
      font-size: 14px;
    }

    .desc {
      color: #e2e8f0;
      line-height: 1.6;
      margin-bottom: 16px;
      min-height: 48px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
    }

    .media-wrap iframe,
    .media-wrap audio {
      width: 100%;
      border-radius: 14px;
      border: 0;
      margin-top: 10px;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 16px;
      background: #10b981;
      color: #052e2b;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 14px;
    }

    #map {
      height: 100vh;
      width: 100%;
      background: #07111f;
    }

    .loading,
    .empty {
      color: #cbd5e1;
      padding: 14px 0;
    }

    .error {
      color: #fecaca;
      background: rgba(127,29,29,.35);
      border: 1px solid rgba(248,113,113,.25);
      padding: 12px;
      border-radius: 14px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      #map {
        height: 65vh;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">🌍 Soundmap Space</div>

      <h1>Dünyayı sesle keşfet</h1>
      <p class="lead">
        Haritadaki pinlere tıkla, kayıtları dinle ve albümlere geç.
      </p>

      <input id="searchInput" class="search" type="text" placeholder="Şehir, ülke veya kayıt ara" />

      <div id="categories" class="categories"></div>

      <div id="cardArea" class="card">
        <div class="loading">Kayıtlar yükleniyor...</div>
      </div>

      <div id="errorBox" class="error" style="display:none;"></div>
    </aside>

    <main>
      <div id="map"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://bfwugfrerjprlbbxgacj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_vQA_C-e7I5QjCNLwp6pT5Q_Pz_vhGBe";

    const DEMO = [
      {
        id: 1,
        title: "Yoros Kalesi",
        city: "Istanbul",
        country: "Turkey",
        description: "Boğaz girişinde tarihi atmosfer ve açık alan ambiyansı.",
        lat: 41.18,
        lng: 29.09,
        category: "Kültür",
        vibe: "Tarihî",
        duration: "3:23",
        source_type: "soundcloud",
        embed_url: "https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A149632885&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true",
        preview_audio_url: "",
        shopify_url: "#",
        price_label: "149 TL"
      }
    ];

    const cardArea = document.getElementById("cardArea");
    const categoriesEl = document.getElementById("categories");
    const searchInput = document.getElementById("searchInput");
    const errorBox = document.getElementById("errorBox");

    let map;
    let allPins = [];
    let visiblePins = [];
    let markers = [];
    let activeCategory = "Tümü";
    let activePinId = null;

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
      console.error(message);
    }

    function normalize(value) {
      return (value || "").toString().toLowerCase();
    }

    function getCategories(pins) {
      const set = new Set(["Tümü"]);
      pins.forEach(pin => {
        if (pin.category) set.add(pin.category);
      });
      return [...set];
    }

    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }

    function renderCategories() {
      const cats = getCategories(allPins);
      categoriesEl.innerHTML = "";

      cats.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-btn" + (cat === activeCategory ? " active" : "");
        btn.textContent = cat;
        btn.addEventListener("click", () => {
          activeCategory = cat;
          renderCategories();
          applyFilters();
        });
        categoriesEl.appendChild(btn);
      });
    }

    function filterPins() {
      const q = normalize(searchInput.value);

      return allPins.filter(pin => {
        const categoryOk = activeCategory === "Tümü" ? true : pin.category === activeCategory;
        const text = [
          pin.title,
          pin.city,
          pin.country,
          pin.category,
          pin.description
        ].map(normalize).join(" ");
        return categoryOk && (!q || text.includes(q));
      });
    }

    function renderCard(pin) {
      if (!pin) {
        cardArea.innerHTML = '<div class="empty">Kayıt bulunamadı.</div>';
        return;
      }

      const title = pin.title || "İsimsiz kayıt";
      const city = pin.city || "";
      const country = pin.country || "";
      const description = pin.description || "Açıklama yok";
      const price = pin.price_label || "";
      const category = pin.category || "";
      const vibe = pin.vibe || "";
      const duration = pin.duration || "";
      const sourceType = (pin.source_type || "").toLowerCase();
      const embedUrl = pin.embed_url || "";
      const audioUrl = pin.preview_audio_url || "";
      const shopifyUrl = pin.shopify_url || "#";

      let mediaHtml = "";
      if ((sourceType === "soundcloud" || sourceType === "youtube") && embedUrl) {
        mediaHtml = `<iframe src="${embedUrl}" height="166" allow="autoplay; encrypted-media"></iframe>`;
      } else if (audioUrl) {
        mediaHtml = `<audio controls src="${audioUrl}"></audio>`;
      }

      cardArea.innerHTML = `
        <div class="card-header">
          <div>
            <h2 style="margin:0;">${title}</h2>
            <div class="location">${city}${country ? ", " + country : ""}</div>
          </div>
          ${price ? `<div class="badge">${price}</div>` : ""}
        </div>

        <div class="desc">${description}</div>

        <div class="meta-row">
          ${category ? `<div class="pill">${category}</div>` : ""}
          ${vibe ? `<div class="pill">${vibe}</div>` : ""}
          ${duration ? `<div class="pill">${duration}</div>` : ""}
          ${sourceType ? `<div class="pill">${sourceType}</div>` : ""}
        </div>

        <div class="media-wrap">
          ${mediaHtml}
        </div>

        ${shopifyUrl && shopifyUrl !== "#" ? `
          <a class="buy-btn" href="${shopifyUrl}" target="_blank" rel="noreferrer">
            Albümü satın al
          </a>
        ` : ""}
      `;
    }
const defaultIcon = L.icon({
  iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41]
});

const activeIcon = L.icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41]
});
    function renderMarkers() {
  clearMarkers();

  visiblePins.forEach(pin => {
    if (pin.lat == null || pin.lng == null) return;

    const marker = L.marker([pin.lat, pin.lng], {
      icon: pin.id === activePinId ? activeIcon : defaultIcon
    }).addTo(map);

    marker.on("click", () => {
      activePinId = pin.id;
      renderCard(pin);
      renderMarkers();
    });

    marker.bindPopup(`
      <div style="
        background:#020617;
        color:white;
        padding:10px;
        border-radius:12px;
        min-width:160px;
        font-family:sans-serif;
      ">
        <div style="font-weight:700;margin-bottom:4px;">
          ${pin.title || "Kayıt"}
        </div>

        <div style="font-size:12px;color:#94a3b8;margin-bottom:6px;">
          ${pin.city || ""}${pin.country ? ", " + pin.country : ""}
        </div>

        ${pin.category ? `
          <div style="
            font-size:11px;
            background:#10b98122;
            padding:4px 6px;
            border-radius:6px;
            display:inline-block;
            margin-bottom:6px;
          ">
            ${pin.category}
          </div>
        ` : ""}

        <div style="font-size:12px;color:#cbd5e1;">
          🎧 dinlemek için tıkla
        </div>
      </div>
    `);

    markers.push(marker);
  });

  if (visiblePins.length > 0) {
    const first = visiblePins.find(p => p.id === activePinId) || visiblePins[0];
    activePinId = first.id;
    renderCard(first);

    const bounds = L.latLngBounds(
      visiblePins
        .filter(p => p.lat != null && p.lng != null)
        .map(p => [p.lat, p.lng])
    );

    if (bounds.isValid()) {
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  } else {
    renderCard(null);
  }
}

    function applyFilters() {
      visiblePins = filterPins();
      renderMarkers();
    }

    async function loadPins() {
      try {
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await supabase
          .from("soundmap_pins")
          .select("*")
          .order("title", { ascending: true });

        if (error || !data || !data.length) {
          allPins = DEMO;
        } else {
          allPins = data;
        }

        renderCategories();
        applyFilters();
      } catch (err) {
        allPins = DEMO;
        renderCategories();
        applyFilters();
        showError("Supabase fallback devrede. Demo veri gösteriliyor.\n\n" + (err?.message || err));
      }
    }

    function initMap() {
      try {
        map = L.map("map", { zoomControl: true }).setView([39.0, 35.0], 5);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap"
        }).addTo(map);

        setTimeout(() => {
          map.invalidateSize();
        }, 700);
      } catch (err) {
        showError("Harita başlatılamadı:\n" + (err?.message || err));
      }
    }

    searchInput.addEventListener("input", applyFilters);

    window.addEventListener("load", () => {
      initMap();
      loadPins();
    });
  </script>
</body>
</html>
