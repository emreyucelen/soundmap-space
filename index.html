<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soundmap Space</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {margin:0;font-family:sans-serif;background:#020617;color:white;}
.page {display:grid;grid-template-columns:380px 1fr;height:100vh;}

.sidebar {
padding:24px;
background:#07111f;
border-right:1px solid rgba(255,255,255,0.08);
}

.brand {
background:#10b98122;
padding:10px 14px;
border-radius:999px;
display:inline-block;
margin-bottom:10px;
}

h1 {font-size:30px;margin:10px 0;}
.lead {color:#cbd5e1;font-size:14px;margin-bottom:15px;}

.search {
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#ffffff11;
color:white;
margin-bottom:12px;
}

.categories {display:flex;gap:8px;margin-bottom:15px;}
.cat-btn {
padding:8px 12px;
border-radius:999px;
background:#ffffff11;
border:none;
color:white;
cursor:pointer;
}
.cat-btn.active {background:#10b981;}

.card {
background:#ffffff10;
padding:16px;
border-radius:18px;
}

.title {font-size:20px;font-weight:bold;}
.location {color:#94a3b8;margin-bottom:10px;}

.price {
background:#10b981;
color:black;
padding:6px 10px;
border-radius:8px;
display:inline-block;
font-weight:bold;
margin-bottom:10px;
}

iframe {width:100%;border-radius:12px;border:none;margin-top:10px;}

.buy {
display:block;
margin-top:10px;
background:#10b981;
padding:10px;
border-radius:10px;
text-align:center;
color:black;
font-weight:bold;
text-decoration:none;
}

#map {height:100%;}

.popup {
font-size:14px;
}
</style>
</head>

<body>

<div class="page">

<div class="sidebar">
<div class="brand">🌍 Soundmap</div>

<h1>Dünyayı sesle keşfet</h1>
<p class="lead">Pinlere tıkla, sesleri dinle.</p>

<input id="search" class="search" placeholder="Ara..." />

<div id="cats" class="categories"></div>

<div id="card" class="card">Yükleniyor...</div>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://bfwugfrerjprlbbxgacj.supabase.co",
"sb_publishable_vQA_C-e7I5QjCNLwp6pT5Q_Pz_vhGBe"
);

let map = L.map("map").setView([39,35],5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let pins = [];
let activeCat = "Tümü";

const card = document.getElementById("card");
const cats = document.getElementById("cats");
const search = document.getElementById("search");

function renderCard(p){

card.innerHTML = `
<div class="title">${p.title}</div>
<div class="location">${p.city}, ${p.country}</div>
${p.price_label ? `<div class="price">${p.price_label}</div>` : ""}
<div>${p.description || "Açıklama yok"}</div>

${p.embed_url ? `<iframe src="${p.embed_url}"></iframe>` : ""}

${p.shopify_url ? `<a class="buy" href="${p.shopify_url}" target="_blank">Satın al</a>` : ""}
`;

}

function renderCats(){

const all = ["Tümü", ...new Set(pins.map(p=>p.category).filter(Boolean))];

cats.innerHTML="";

all.forEach(c=>{
const btn=document.createElement("button");
btn.className="cat-btn"+(c===activeCat?" active":"");
btn.innerText=c;

btn.onclick=()=>{
activeCat=c;
renderCats();
draw();
};

cats.appendChild(btn);
});

}

function draw(){

map.eachLayer(l=>{
if(l instanceof L.Marker) map.removeLayer(l);
});

let filtered = pins.filter(p=>{
if(activeCat!=="Tümü" && p.category!==activeCat) return false;

if(search.value){
let t=(p.title+p.city+p.country).toLowerCase();
return t.includes(search.value.toLowerCase());
}

return true;
});

filtered.forEach(p=>{

let m = L.marker([p.lat,p.lng]).addTo(map);

m.on("click",()=>renderCard(p));

m.bindPopup(`
<div class="popup">
<b>${p.title}</b><br>
${p.city}<br>
🎧 dinlemek için tıkla
</div>
`);

});

if(filtered[0]) renderCard(filtered[0]);

}

search.oninput = draw;

async function load(){

const {data} = await supabase.from("soundmap_pins").select("*");

pins = data || [];

renderCats();
draw();

}

load();

</script>

</body>
</html>
