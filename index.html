<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundmap Space</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, Arial, sans-serif;
      background: #020617;
      color: #fff;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    .sidebar {
      padding: 24px;
      border-right: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top left, rgba(16,185,129,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,0.16), transparent 35%),
        #07111f;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.28);
      color: #d1fae5;
      font-size: 14px;
      font-weight: 600;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 34px;
      line-height: 1.05;
    }

    .lead {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 15px;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      margin-bottom: 14px;
    }

    .search::placeholder { color: #94a3b8; }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .cat-btn {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    .cat-btn.active {
      background: rgba(16,185,129,0.14);
      border-color: rgba(16,185,129,0.4);
      color: #d1fae5;
    }

    .card {
      margin-top: 14px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 13px;
      white-space: nowrap;
    }

    .location {
      color: #94a3b8;
      margin: 8px 0 14px;
      font-size: 14px;
    }

    .desc {
      color: #e2e8f0;
      line-height: 1.6;
      margin-bottom: 16px;
      min-height: 48px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
    }

    .media-wrap iframe,
    .media-wrap audio {
      width: 100%;
      border-radius: 14px;
      border: 0;
      margin-top: 10px;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 16px;
      background: #10b981;
      color: #052e2b;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 14px;
    }

    .buy-btn:hover { opacity: 0.92; }

    #map {
      height: 100vh;
      width: 100%;
    }

    .loading,
    .empty {
      color: #cbd5e1;
      padding: 14px 0;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      #map {
        height: 65vh;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">🌍 Soundmap Space</div>

      <h1>Dünyayı sesle keşfet</h1>
      <p class="lead">
        Haritadaki pinlere tıkla, kayıtları dinle ve albümlere geç.
      </p>

      <input id="searchInput" class="search" type="text" placeholder="Şehir, ülke veya kayıt ara" />

      <div id="categories" class="categories"></div>

      <div id="cardArea" class="card">
        <div class="loading">Kayıtlar yükleniyor...</div>
      </div>
    </aside>

    <main>
      <div id="map"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const SUPABASE_URL = "https://bfwugfrerjprlbbxgacj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_vQA_C-e7I5QjCNLwp6pT5Q_Pz_vhGBe";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const map = L.map("map", { zoomControl: true }).setView([39.0, 35.0], 5);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const cardArea = document.getElementById("cardArea");
    const categoriesEl = document.getElementById("categories");
    const searchInput = document.getElementById("searchInput");

    let allPins = [];
    let visiblePins = [];
    let markers = [];
    let activeCategory = "Tümü";
    let activePinId = null;

    function normalize(value) {
      return (value || "").toString().toLowerCase();
    }

    function getCategories(pins) {
      const set = new Set(["Tümü"]);
      pins.forEach(pin => {
        if (pin.category) set.add(pin.category);
      });
      return [...set];
    }

    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }

    function renderCategories() {
      const cats = getCategories(allPins);
      categoriesEl.innerHTML = "";

      cats.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-btn" + (cat === activeCategory ? " active" : "");
        btn.textContent = cat;
        btn.addEventListener("click", () => {
          activeCategory = cat;
          renderCategories();
          applyFilters();
        });
        categoriesEl.appendChild(btn);
      });
    }

    function filterPins() {
      const q = normalize(searchInput.value);

      return allPins.filter(pin => {
        const categoryOk = activeCategory === "Tümü" ? true : pin.category === activeCategory;
        const text = [
          pin.title,
          pin.city,
          pin.country,
          pin.category,
          pin.description
        ].map(normalize).join(" ");

        return categoryOk && (!q || text.includes(q));
      });
    }

    function renderCard(pin) {
      if (!pin) {
        cardArea.innerHTML = '<div class="empty">Kayıt bulunamadı.</div>';
        return;
      }

      const title = pin.title || "İsimsiz kayıt";
      const city = pin.city || "";
      const country = pin.country || "";
      const description = pin.description || "Açıklama yok";
      const price = pin.price_label || "";
      const category = pin.category || "";
      const vibe = pin.vibe || "";
      const duration = pin.duration || "";
      const sourceType = (pin.source_type || "").toLowerCase();
      const embedUrl = pin.embed_url || "";
      const audioUrl = pin.preview_audio_url || "";
      const shopifyUrl = pin.shopify_url || "#";

      let mediaHtml = "";
      if (sourceType === "soundcloud" || sourceType === "youtube") {
        if (embedUrl) {
          mediaHtml = `<iframe src="${embedUrl}" height="166" allow="autoplay; encrypted-media"></iframe>`;
        }
      } else if (audioUrl) {
        mediaHtml = `<audio controls src="${audioUrl}"></audio>`;
      }

      cardArea.innerHTML = `
        <div class="card-header">
          <div>
            <h2 style="margin:0;">${title}</h2>
            <div class="location">${city}${country ? ", " + country : ""}</div>
          </div>
          ${price ? `<div class="badge">${price}</div>` : ""}
        </div>

        <div class="desc">${description}</div>

        <div class="meta-row">
          ${category ? `<div class="pill">${category}</div>` : ""}
          ${vibe ? `<div class="pill">${vibe}</div>` : ""}
          ${duration ? `<div class="pill">${duration}</div>` : ""}
          ${sourceType ? `<div class="pill">${sourceType}</div>` : ""}
        </div>

        <div class="media-wrap">
          ${mediaHtml}
        </div>

        ${shopifyUrl && shopifyUrl !== "#" ? `
          <a class="buy-btn" href="${shopifyUrl}" target="_blank" rel="noreferrer">
            Albümü satın al
          </a>
        ` : ""}
      `;
    }

    function renderMarkers() {
      clearMarkers();

      visiblePins.forEach(pin => {
        if (pin.lat == null || pin.lng == null) return;

        const marker = L.marker([pin.lat, pin.lng]).addTo(map);
        marker.on("click", () => {
          activePinId = pin.id;
          renderCard(pin);
        });

        marker.bindTooltip(pin.title || "Kayıt", {
          direction: "top",
          offset: [0, -8]
        });

        markers.push(marker);
      });

      if (visiblePins.length > 0) {
        const first = visiblePins.find(p => p.id === activePinId) || visiblePins[0];
        activePinId = first.id;
        renderCard(first);

        const bounds = L.latLngBounds(
          visiblePins
            .filter(p => p.lat != null && p.lng != null)
            .map(p => [p.lat, p.lng])
        );

        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [40, 40] });
        }
      } else {
        renderCard(null);
      }
    }

    function applyFilters() {
      visiblePins = filterPins();
      renderMarkers();
    }

    async function loadPins() {
      const { data, error } = await supabase
        .from("soundmap_pins")
        .select("*")
        .order("title", { ascending: true });

      if (error) {
        cardArea.innerHTML = `<div class="empty">Hata: ${error.message}</div>`;
        return;
      }

      allPins = data || [];
      renderCategories();
      applyFilters();
    }

    searchInput.addEventListener("input", applyFilters);

    loadPins();
  </script>
</body>
</html>
